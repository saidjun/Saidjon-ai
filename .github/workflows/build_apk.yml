name: Build and Package Pure Factory Telegram APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Download Pure Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Android NDK Tools
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          local-properties: true

      - name: Inject Factory Local Properties (100% Pure Factory Setup)
        run: |
          # 1. Сохтани автоматӣ дар тамоми вариантҳои папкаҳо дақиқ баъди checkout дар сервер
          mkdir -p buildSrc TMessagesProj
          mkdir -p /home/runner/work/Saidjon-ai/Saidjon-ai/buildSrc
          mkdir -p /home/runner/work/Saidjon-ai/Saidjon-ai/TMessagesProj
          
          # 2. Навиштани суроғаи заводии SDK ва NDK мустақиман дар компютери сервер
          IFS=',' read -r -a paths <<< ".,./buildSrc,./TMessagesProj,/home/runner/work/Saidjon-ai/Saidjon-ai,/home/runner/work/Saidjon-ai/Saidjon-ai/buildSrc,/home/runner/work/Saidjon-ai/Saidjon-ai/TMessagesProj"
          for path in "${paths[@]}"; do
            echo "sdk.dir=/usr/local/lib/android/sdk" > "$path/local.properties"
            echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$path/local.properties"
          done
          
          echo "✅ МУҲИТ: Танзимоти заводии сервер 100% соз ва қулф шуд!"

      - name: Prepare Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Pure Telegram Factory APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1"
        run: |
          chmod +x gradlew
          # Пухтани мустақими барнома дар ҳолати соф ва стандартии заводӣ
          ./gradlew assembleDebug --no-daemon --stacktrace -x test -x lint -x check
          
      - name: Deliver Finished APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Pure-Factory-APK
          path: "TMessagesProj/build/outputs/apk/**/*.apk"
