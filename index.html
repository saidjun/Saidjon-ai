<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY SUPREME</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #00f2ff; color: black; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #main-content { display: none; text-align: center; }
        .admin-btn { background: gold; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <h2 style="color:#00f2ff">GALAXY SUPREME</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">ДАРОМАДАН</button>
        <p style="font-size: 12px; color: #8b949e; cursor: pointer;" onclick="register()">Сабти номи нав</p>
    </div>

    <div id="main-content" class="card">
        <h2 id="user-name">Хуш омадед!</h2>
        <h1 id="user-balance" style="color:gold">0 TJS</h1>
        <button class="admin-btn" id="admin-link">👑 ПАНЕЛИ АДМИН</button>
        <button onclick="logout()" style="background:#f85149; color:white; margin-top:20px;">БАРОМАДАН</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdPoSKgrMgEdVdcZprdVayVOb7cUm8TsM",
            authDomain: "saidjon-forabes.firebaseapp.com",
            projectId: "saidjon-forabes",
            databaseURL: "https://saidjon-forabes-default-rtdb.firebaseio.com",
            storageBucket: "saidjon-forabes.firebasestorage.app",
            messagingSenderId: "13121799381",
            appId: "1:13121799381:web:2b515c4497ce4ea8d50e5c"
        };
        firebase.initializeApp(firebaseConfig);

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Пур кунед!");
            firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert("Хато: " + err.message));
        }

        function register() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Пур кунед!");
            firebase.auth().createUserWithEmailAndPassword(e, p).catch(err => alert("Хато: " + err.message));
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadData(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('main-content').style.display = 'none';
            }
        });

        function loadData(uid) {
            firebase.database().ref('users/' + uid).on('value', snap => {
                const data = snap.val();
                if (data) {
                    document.getElementById('user-balance').innerText = (data.bal || 0) + " TJS";
                    // Ислоҳи мушкили "admin"
                    let role = String(data.role).replace(/['"]+/g, '');
                    if (role === 'admin') {
                        document.getElementById('admin-link').style.display = 'block';
                    }
                } else {
                    firebase.database().ref('users/' + uid).set({ bal: 0, role: 'user' });
                }
            });
        }

        function logout() { firebase.auth().signOut(); }
    </script>
</body>
</html>
