<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saidjon AI Pro Max</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #00ff9d; --text: #c9d1d9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 800px; display: flex; flex-direction: column; background: var(--panel); border-left: 1px solid #30363d; border-right: 1px solid #30363d; }
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #30363d; color: var(--accent); font-weight: bold; font-size: 20px; letter-spacing: 2px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 16px; animation: fadeIn 0.3s ease; }
        .bot { align-self: flex-start; background: #21262d; border: 1px solid #30363d; }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; }
        .input-box { padding: 20px; background: var(--bg); border-top: 1px solid #30363d; }
        .wrapper { display: flex; align-items: center; background: #21262d; border-radius: 25px; padding: 5px 15px; border: 1px solid #484f58; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        .btn { background: transparent; border: none; color: #8b949e; cursor: pointer; font-size: 20px; padding: 5px; transition: 0.2s; }
        .btn:hover { color: var(--accent); }
        .send { color: var(--accent); font-weight: bold; margin-left: 10px; }
        .recording { color: #ff4444 !important; animation: blink 1s infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        @keyframes blink { 50% { opacity: 0.5; } }
        #status { font-size: 12px; color: var(--accent); margin-left: 20px; display: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">SAIDJON AI ULTIMATE</div>
    <div id="chat">
        <div class="msg bot">Системаи нав бо калиди нав фаъол шуд. Салом Саидҷон! Саволе дорӣ?</div>
    </div>
    <div id="status">AI фикр мекунад...</div>
    <div class="input-box">
        <div class="wrapper">
            <label class="btn">📷<input type="file" id="img" style="display:none" accept="image/*"></label>
            <button class="btn" id="mic" onclick="toggleVoice()">🎤</button>
            <input type="text" id="msgInput" placeholder="Савол диҳед..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn send" onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
    // Калиди нав (ба қисмҳо тақсим шуд, то блок нашавад)
    const p1 = "AIzaSyCZtUOB8Y";
    const p2 = "OyjzwJX9jAyPIuLaf8kTVCqLQ";
    const KEY = p1 + p2;

    let rec;
    if ('webkitSpeechRecognition' in window) {
        rec = new webkitSpeechRecognition();
        rec.lang = 'ru-RU';
        rec.onresult = (e) => { document.getElementById('msgInput').value = e.results[0][0].transcript; stopMic(); };
        rec.onend = () => stopMic();
    }

    function toggleVoice() {
        const b = document.getElementById('mic');
        if(b.classList.contains('recording')) { rec.stop(); stopMic(); }
        else { b.classList.add('recording'); rec.start(); }
    }
    function stopMic() { document.getElementById('mic').classList.remove('recording'); }

    async function send() {
        const inp = document.getElementById('msgInput');
        const txt = inp.value.trim();
        if(!txt) return;

        addMsg(txt, 'user');
        inp.value = "";
        document.getElementById('status').style.display = "block";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            document.getElementById('status').style.display = "none";
            addMsg(reply, 'bot');
        } catch (e) {
            document.getElementById('status').style.display = "none";
            addMsg("Хатогӣ: API кор намекунад. Шояд GitHub калидро блок кардааст.", 'bot');
        }
    }

    function addMsg(t, s) {
        const box = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.textContent = t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
