<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY V72 | SAIDJON EMPIRE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00f2ff; --gold: #ffd700; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* UI ELEMENTS */
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .screen { display: none; padding: 20px; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .active { display: block !important; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* BUTTONS & INPUTS */
        input { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; color: #fff; margin: 10px 0; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: linear-gradient(135deg, var(--primary), #0062ff); color: white; }

        /* WHEEL GAME */
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 20px auto; border-radius: 50%; border: 5px solid var(--gold); overflow: hidden; transition: 4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .wheel-img { width: 100%; height: 100%; object-fit: cover; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; background: var(--gold); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        /* NAVBAR */
        .nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(10,10,10,0.9); height: 70px; border-radius: 18px; display: flex; justify-content: space-around; align-items: center; border: 1px solid var(--border); z-index: 1000; }
        .nav-i { color: #555; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .nav-i.active { color: var(--primary); transform: scale(1.1); }
    </style>
</head>
<body>

    <audio id="coinSound" src="https://www.myinstants.com/media/sounds/coin-collect.mp3"></audio>

    <div id="auth-screen" class="screen active" style="display:flex; align-items:center; justify-content:center;">
        <div class="card" style="width:100%; max-width:380px; text-align:center;">
            <h1 style="color:var(--primary);">GALAXY V72</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn btn-main" onclick="authAction('login')">ДАРОМАДАН</button>
            <p style="margin-top:15px; font-size:12px; opacity:0.5; cursor:pointer;" onclick="authAction('signup')">Сабти номи нав</p>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div id="home" class="screen">
            <div class="card" style="text-align:center;">
                <h3 id="u-name">...</h3>
                <h1 id="u-bal" style="font-size:50px; color:var(--gold);">0 TJS</h1>
                <small style="opacity:0.4;">ID: <span id="u-uid">...</span></small>
            </div>
            
            <div class="card" style="text-align:center;">
                <b><i class="fa-solid fa-spinner"></i> Чархи Иқбол</b>
                <div style="position:relative;">
                    <div class="pointer"></div>
                    <div id="wheel" class="wheel-box">
                        <img src="https://i.imgur.com/K5f4pA1.png" class="wheel-img">
                    </div>
                </div>
                <button class="btn btn-main" onclick="spinWheel()">ЧАРХ ЗАДАН (10 TJS)</button>
            </div>
        </div>

        <div id="wallet" class="screen">
            <h2>Ҳамён</h2>
            <div class="card" style="border: 1px solid var(--gold);">
                <small>СБЕРБАНК / СБП:</small>
                <div style="display:flex; justify-content:space-between; margin-top:5px;">
                    <b id="num">+79005778557</b>
                    <i class="fa-solid fa-copy" onclick="copyNum()"></i>
                </div>
                <p style="font-size:12px; color:var(--primary); margin-top:5px;">Қабулкунанда: САИДҶОН</p>
            </div>

            <div class="card">
                <b>Боргузории Чек:</b>
                <input type="number" id="t-amt" placeholder="Маблағи гузарондашуда">
                <input type="file" id="t-file" accept="image/*" onchange="preview(this)">
                <img id="pre" style="width:100%; border-radius:12px; display:none; margin:10px 0;">
                <button class="btn btn-main" onclick="sendReq()">ФИРИСТОДАНИ ЧЕК</button>
            </div>

            <div class="card">
                <b>Таърихи пардохтҳо:</b>
                <div id="user-history-list"></div>
            </div>
        </div>

        <div id="admin" class="screen">
            <h2 style="color:var(--gold);">Админ Панел</h2>
            <div id="admin-reqs"></div>
        </div>

        <div class="nav">
            <div class="nav-i active" onclick="tab('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-i" onclick="tab('wallet', this)"><i class="fa-solid fa-wallet"></i></div>
            <div id="adm-btn" class="nav-i" style="display:none;" onclick="tab('admin', this)"><i class="fa-solid fa-crown"></i></div>
            <div class="nav-i" onclick="logout()"><i class="fa-solid fa-power-off"></i></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdPoSKgrMgEdVdcZprdVayVOb7cUm8TsM",
            authDomain: "saidjon-forabes.firebaseapp.com",
            projectId: "saidjon-forabes",
            databaseURL: "https://saidjon-forabes-default-rtdb.firebaseio.com",
            storageBucket: "saidjon-forabes.firebasestorage.app",
            messagingSenderId: "13121799381",
            appId: "1:13121799381:web:2b515c4497ce4ea8d50e5c"
        };

        const TG_TOKEN = "7165191876:AAGH5DRH7bEqmoC4OoGcJ5JUqNvJgSkTSYs";
        const TG_ID = "7165191876";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let uData, selImg, lastBal, spinning = false;

        // AUTH
        function authAction(t) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(t==='login') auth.signInWithEmailAndPassword(e, p);
            else auth.createUserWithEmailAndPassword(e, p).then(r => db.ref('users/'+r.user.uid).set({name: e.split('@')[0], bal:0, role:'user'}));
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').classList.remove('active');
                document.getElementById('app').style.display = 'block';
                loadUser(user.uid);
            } else {
                document.getElementById('auth-screen').classList.add('active');
                document.getElementById('app').style.display = 'none';
            }
        });

        function loadUser(uid) {
            db.ref('users/'+uid).on('value', snap => {
                uData = snap.val(); if(!uData) return;
                document.getElementById('u-name').innerText = uData.name;
                document.getElementById('u-uid').innerText = uid;
                if(lastBal !== null && uData.bal > lastBal) document.getElementById('coinSound').play();
                lastBal = uData.bal;
                document.getElementById('u-bal').innerText = uData.bal + " TJS";
                if(uData.role === 'admin') { document.getElementById('adm-btn').style.display = 'block'; loadAdmin(); }
                loadHistory(uid);
            });
        }

        // WHEEL GAME LOGIC
        function spinWheel() {
            if(spinning || uData.bal < 10) return alert("Пул кам аст (10 TJS лозим) ё чарх зада истодааст!");
            spinning = true;
            db.ref('users/'+auth.currentUser.uid+'/bal').transaction(c => c - 10);
            
            const deg = Math.floor(5000 + Math.random() * 5000);
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
            
            setTimeout(() => {
                spinning = false;
                const win = Math.floor(Math.random() * 50); // Бурди тасодуфӣ
                db.ref('users/'+auth.currentUser.uid+'/bal').transaction(c => c + win);
                alert(`Шумо ${win} TJS бурд кардед!`);
            }, 4000);
        }

        // WALLET
        function preview(i) {
            const r = new FileReader(); r.onload = e => { document.getElementById('pre').src = e.target.result; document.getElementById('pre').style.display='block'; selImg = e.target.result; };
            r.readAsDataURL(i.files[0]);
        }

        function sendReq() {
            const amt = document.getElementById('t-amt').value;
            if(!amt || !selImg) return alert("Пур кунед!");
            db.ref('requests').push({uid: auth.currentUser.uid, name: uData.name, amount: amt, img: selImg, status: 'pending', time: Date.now()})
            .then(() => {
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent("💰 ЧЕК: "+uData.name+" | "+amt+" TJS")}`);
                alert("Дархост рафт!");
            });
        }

        function loadHistory(uid) {
            db.ref('requests').orderByChild('uid').equalTo(uid).on('value', snap => {
                const list = document.getElementById('user-history-list'); list.innerHTML = '';
                snap.forEach(c => {
                    const r = c.val();
                    list.innerHTML += `<div style="border-bottom:1px solid #222; padding:10px; display:flex; justify-content:space-between;">
                        <span>${r.amount} TJS</span>
                        <b style="color:${r.status==='approved'?'#00ff88':'#ffd700'}">${r.status}</b>
                    </div>`;
                });
            });
        }

        function loadAdmin() {
            db.ref('requests').on('value', snap => {
                const div = document.getElementById('admin-reqs'); div.innerHTML = '';
                snap.forEach(c => {
                    const r = c.val();
                    if(r.status === 'pending') {
                        div.innerHTML += `<div class="card">
                            <b>${r.name} (${r.amount} TJS)</b>
                            <img src="${r.img}" style="width:100%; border-radius:10px;">
                            <button class="btn btn-main" onclick="approve('${c.key}', '${r.uid}', ${r.amount})">ТАСДИҚ</button>
                        </div>`;
                    }
                });
            });
        }

        function approve(key, uid, amt) {
            db.ref('users/'+uid+'/bal').transaction(c => (c||0) + Number(amt));
            db.ref('requests/'+key).update({status:'approved'});
        }

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        function copyNum() { navigator.clipboard.writeText("+79005778557"); alert("Рақам нусха шуд!"); }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
