<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON AI PRO</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        .ui-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .box {
            padding: 40px 20px;
            background: rgba(0, 40, 20, 0.2);
            border: 2px solid #00ff9d;
            border-radius: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.4);
            width: 85%;
            max-width: 350px;
        }

        .logo {
            font-size: 70px;
            font-weight: bold;
            color: #00ff9d;
            text-shadow: 0 0 20px #00ff9d;
            margin-bottom: 10px;
        }

        h1 { color: #00ff9d; font-size: 22px; letter-spacing: 5px; margin-bottom: 30px; }

        .main-btn {
            display: inline-block;
            text-decoration: none;
            color: #000;
            background: #00ff9d;
            padding: 18px 30px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.4);
            transition: 0.3s;
        }

        .main-btn:active { transform: scale(0.9); box-shadow: 0 0 40px #00ff9d; }
    </style>
</head>
<body>

<canvas id="m"></canvas>

<div class="ui-content">
    <div class="box">
        <div class="logo">S</div>
        <h1>SAIDJON AI</h1>
        <a href="https://gemini.google.com/app" class="main-btn">ОҒОЗИ СӮҲБАТ</a>
    </div>
</div>

<script>
    const c = document.getElementById("m");
    const ctx = c.getContext("2d");

    c.height = window.innerHeight;
    c.width = window.innerWidth;

    const txts = "0101SaidjonAI0101";
    const fz = 16;
    const cols = c.width / fz;
    const drops = [];

    for (let x = 0; x < cols; x++) drops[x] = 1;

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = "#00ff9d";
        ctx.font = fz + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = txts.charAt(Math.floor(Math.random() * txts.length));
            ctx.fillText(text, i * fz, drops[i] * fz);
            if (drops[i] * fz > c.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);
</script>

</body>
</html>
