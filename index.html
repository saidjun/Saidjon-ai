<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON AI PRO MAX</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.5; }

        #welcome-screen { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; background: #000; }
        .box { padding: 40px; border: 2px solid #00ff9d; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 0 20px #00ff9d; width: 85%; max-width: 380px; }
        .start-btn { padding: 15px 30px; background: transparent; color: #00ff9d; border: 1px solid #00ff9d; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        #chat-interface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20; display: none; flex-direction: column; }
        .header { padding: 15px; border-bottom: 1px solid #00ff9d; display: flex; justify-content: space-between; align-items: center; color: #00ff9d; }
        
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 5px; max-width: 80%; font-size: 14px; border: 1px solid; }
        .bot { border-color: #00ff9d; color: #00ff9d; align-self: flex-start; }
        .user { background: #00ff9d; color: #000; align-self: flex-end; }

        .input-area { padding: 15px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #00ff9d; background: #000; padding-bottom: 30px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: transparent; border: 1px solid #00ff9d; padding: 12px; color: #00ff9d; outline: none; }
        
        .icon-btn { background: transparent; border: 1px solid #00ff9d; color: #00ff9d; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 5px; }
        .icon-btn.active { background: #ff4444; border-color: #ff4444; color: white; animation: pulse 1s infinite; }
        .send-btn { background: #00ff9d; color: #000; border: none; padding: 0 20px; font-weight: bold; height: 45px; cursor: pointer; border-radius: 5px; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #status { display: none; color: #00ff9d; font-size: 11px; margin-left: 15px; }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="welcome-screen">
    <div class="box">
        <h1 style="color:#00ff9d">S-AI v5.0</h1>
        <button class="start-btn" onclick="start()">ВУРУД</button>
    </div>
</div>

<div id="chat-interface">
    <div class="header">
        <span>SAIDJON_AI_MULTIMODAL</span>
        <span onclick="location.reload()" style="cursor:pointer">[X]</span>
    </div>
    <div id="chat-messages">
        <div class="msg bot">Система фаъол. Овоз ва Расм дастрас аст. Савол деҳ!</div>
    </div>
    <div id="status">Система дар ҳоли кор...</div>
    <div class="input-area">
        <div class="controls">
            <label class="icon-btn" for="file-input">📷</label>
            <input type="file" id="file-input" style="display:none" accept="image/*">
            
            <button class="icon-btn" id="voice-btn" onclick="toggleVoice()">🎤</button>
            
            <input type="text" id="user-input" placeholder="Нависед ё гап занед...">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAQc4f5RoKvHWNIp7fRxYN_d16QKHUeNOM";
    let recognition;

    function start() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('chat-interface').style.display = 'flex';
        setupVoice();
    }

    // Танзими Овоз (Speech to Text)
    function setupVoice() {
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'ru-RU'; // Чун тоҷикиро Google суст мефаҳмад, дар ҳолати русӣ беҳтар кор мекунад

            recognition.onresult = function(event) {
                const result = event.results[0][0].transcript;
                document.getElementById('user-input').value = result;
                toggleVoice(); // Хомӯш кардани тугма пас аз фаҳмидан
            };

            recognition.onerror = function() { toggleVoice(); };
        }
    }

    function toggleVoice() {
        const btn = document.getElementById('voice-btn');
        if (btn.classList.contains('active')) {
            btn.classList.remove('active');
            recognition.stop();
        } else {
            btn.classList.add('active');
            recognition.start();
        }
    }

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";
        document.getElementById('status').style.display = "block";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            
            document.getElementById('status').style.display = "none";
            addMsg(reply, 'bot');
        } catch (e) {
            document.getElementById('status').style.display = "none";
            addMsg("Хатогии техникӣ. Пайвастшавӣ нашуд.", 'bot');
        }
    }

    function addMsg(text, side) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.textContent = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // Matrix
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const columns = canvas.width / 20;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00ff9d"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(String.fromCharCode(Math.random()*128), i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);
</script>
</body>
</html>
