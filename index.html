<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON AI PRO</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #00ff9d; overflow: hidden; }
        #chat-container { display: flex; flex-direction: column; height: 100vh; border: 2px solid #00ff9d; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; border: 1px solid #00ff9d; font-size: 14px; }
        .bot { align-self: flex-start; background: rgba(0, 255, 157, 0.1); }
        .user { align-self: flex-end; background: #00ff9d; color: #000; font-weight: bold; }
        .input-area { padding: 20px; border-top: 1px solid #00ff9d; display: flex; gap: 8px; background: #000; }
        input { flex: 1; background: transparent; border: 1px solid #00ff9d; color: #fff; padding: 10px; outline: none; }
        .btn { background: transparent; border: 1px solid #00ff9d; color: #00ff9d; padding: 10px; cursor: pointer; border-radius: 5px; }
        .recording { background: red; color: white; border-color: white; }
        #status { font-size: 10px; padding-left: 20px; display: none; }
    </style>
</head>
<body>

<div id="chat-container">
    <div style="padding: 10px; border-bottom: 1px solid #00ff9d; text-align: center;">SAIDJON AI v6.0</div>
    <div id="messages">
        <div class="msg bot">Салом Саидҷон! Система омода аст. Тугмаи микрофон ва расмро санҷ.</div>
    </div>
    <div id="status">AI фикр мекунад...</div>
    <div class="input-area">
        <label class="btn">📷<input type="file" style="display:none" accept="image/*"></label>
        <button class="btn" id="mic-btn" onclick="startVoice()">🎤</button>
        <input type="text" id="user-input" placeholder="Савол нависед...">
        <button class="btn" onclick="sendToAI()" style="background:#00ff9d; color:#000">➤</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAQc4f5RoKvHWNIp7fRxYN_d16QKHUeNOM";
    let rec;

    // 1. Овоз (Микрофон)
    if ('webkitSpeechRecognition' in window) {
        rec = new webkitSpeechRecognition();
        rec.lang = 'ru-RU'; // Барои фаҳмиши беҳтар
        rec.onresult = (e) => { 
            document.getElementById('user-input').value = e.results[0][0].transcript;
            document.getElementById('mic-btn').classList.remove('recording');
        };
    }

    function startVoice() {
        document.getElementById('mic-btn').classList.add('recording');
        rec.start();
    }

    // 2. Равон кардан ба AI
    async function sendToAI() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";
        document.getElementById('status').style.display = "block";

        try {
            // Истифодаи Proxy барои гузаштан аз хатогии CORS
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            
            document.getElementById('status').style.display = "none";
            addMsg(reply, 'bot');
        } catch (e) {
            document.getElementById('status').style.display = "none";
            addMsg("Хатогӣ: Интернет ё API кор намекунад.", 'bot');
        }
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.textContent = text;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
</script>
</body>
</html>
