<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON AI PREMIUM</title>
    <style>
        :root { --neon: #00ff9d; --dark-bg: #080a0f; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            margin: 0; background: var(--dark-bg); color: white; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
        }

        /* Контейнери хурд ва стандартӣ */
        #app { 
            width: 95%; max-width: 400px; height: 85vh; 
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 157, 0.2); border-radius: 25px;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .header { 
            padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: bold; font-size: 14px; color: var(--neon); letter-spacing: 2px;
        }

        #chat { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            scrollbar-width: none;
        }
        #chat::-webkit-scrollbar { display: none; }

        .msg { 
            max-width: 80%; padding: 10px 15px; border-radius: 18px; 
            font-size: 14px; line-height: 1.4; animation: pop 0.3s ease;
        }
        .bot { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--neon); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 600; }

        .loader { display: none; color: var(--neon); font-size: 10px; margin-left: 15px; margin-bottom: 5px; opacity: 0.7; }

        .input-area { 
            padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; gap: 8px; align-items: center;
        }

        .bar { 
            flex: 1; background: rgba(255,255,255,0.08); border-radius: 20px;
            display: flex; align-items: center; padding: 5px 12px;
            border: 1px solid transparent; transition: 0.3s;
        }
        .bar:focus-within { border-color: var(--neon); }

        input { 
            flex: 1; background: transparent; border: none; color: white; 
            padding: 8px; outline: none; font-size: 14px;
        }

        .icon { background: transparent; border: none; color: #aaa; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .icon:hover { color: var(--neon); }
        .mic-on { color: #ff4757; animation: pulse 1s infinite; }

        .send-btn { 
            background: var(--neon); border: none; width: 35px; height: 35px; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div class="header">SAIDJON AI PRO v9</div>
    <div id="chat">
        <div class="msg bot">Система махфӣ ва омода шуд. Салом Саидҷон! Чӣ хел кӯмак кунам?</div>
    </div>
    <div id="loader" class="loader">AI фикр мекунад...</div>
    <div class="input-area">
        <div class="bar">
            <label class="icon">📷<input type="file" style="display:none" accept="image/*"></label>
            <button class="icon" id="m-btn" onclick="talk()">🎤</button>
            <input type="text" id="u-in" placeholder="Нависед..." onkeypress="if(event.key==='Enter') start()">
        </div>
        <button class="send-btn" onclick="start()">➤</button>
    </div>
</div>

<script>
    // Рамзгузории махфӣ барои API
    const _s1 = "AIzaSyCZtUOB8";
    const _s2 = "YOyjzwJX9jAyPI";
    const _s3 = "uLaf8kTVCqLQ";
    const _key = _s1 + _s2 + _s3;

    let rec;
    if ('webkitSpeechRecognition' in window) {
        rec = new webkitSpeechRecognition();
        rec.lang = 'ru-RU';
        rec.onresult = (e) => { document.getElementById('u-in').value = e.results[0][0].transcript; stopUI(); };
        rec.onend = () => stopUI();
    }

    function talk() {
        document.getElementById('m-btn').classList.add('mic-on');
        rec.start();
    }
    function stopUI() { document.getElementById('m-btn').classList.remove('mic-on'); }

    async function start() {
        const inp = document.getElementById('u-in');
        const val = inp.value.trim();
        if(!val) return;

        add(val, 'user');
        inp.value = "";
        document.getElementById('loader').style.display = "block";

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
            });

            const d = await r.json();
            const txt = d.candidates[0].content.parts[0].text;
            document.getElementById('loader').style.display = "none";
            add(txt, 'bot');
        } catch (e) {
            document.getElementById('loader').style.display = "none";
            add("Хатогӣ: Пайваст нашуд. Шояд интернет суст аст ё API блок шудааст.", 'bot');
        }
    }

    function add(t, s) {
        const c = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.textContent = t;
        c.appendChild(d);
        c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
