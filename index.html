<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIDJON TELEGRAM V19</title>
    <style>
        :root { --tg-bg: #0e1621; --tg-panel: #17212b; --tg-blue: #2481cc; --tg-accent: #00ff9d; --tg-text: #f5f5f5; --premium: #f39c12; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: #000; color: var(--tg-text); height: 100dvh; overflow: hidden; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--tg-bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--tg-panel); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #232e3c; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #2f3942; background: #0e1621; color: white; outline: none; }
        .btn-main { width: 100%; padding: 14px; background: var(--tg-accent); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Layout */
        #app { width: 100%; max-width: 500px; height: 100%; margin: auto; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; }
        .header { padding: 10px 15px; background: var(--tg-panel); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #000; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--tg-accent); color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* Chat */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 15px; font-size: 15px; position: relative; }
        .bot { align-self: flex-start; background: var(--tg-panel); }
        .user { align-self: flex-end; background: #2b5278; }
        .ticks { color: var(--tg-accent); font-size: 10px; margin-left: 5px; }

        /* Modals */
        .modal { position: absolute; inset: 0; background: var(--tg-bg); z-index: 1000; transform: translateX(100%); transition: 0.3s; overflow-y: auto; }
        .modal.open { transform: translateX(0); }
        .modal-header { padding: 15px; background: var(--tg-panel); display: flex; align-items: center; gap: 20px; position: sticky; top: 0; }

        /* Settings Items */
        .item { padding: 15px; background: var(--tg-panel); margin: 5px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item label { font-size: 12px; color: #6c7883; display: block; }

        .footer { padding: 10px; background: var(--tg-panel); display: flex; align-items: center; gap: 8px; }
        textarea { flex: 1; background: var(--tg-bg); border: 1px solid #333; border-radius: 20px; color: white; padding: 10px 15px; outline: none; resize: none; height: 42px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color:var(--tg-accent); text-align:center; margin-bottom:15px">SAIDJON AI V19</h2>
        <input type="text" id="regName" placeholder="Номи пурра">
        <input type="text" id="regNick" placeholder="Никнейм (@saidjon)">
        <select id="regCountry">
            <option value="🇹🇯 Тоҷикистон">Тоҷикистон 🇹🇯</option>
            <option value="🇷🇺 Россия">Россия 🇷🇺</option>
        </select>
        <input type="password" id="regPass" placeholder="Пароли муҳофизат">
        <button class="btn-main" onclick="register()">Эҷод ва Воридшавӣ</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div id="headAv" class="avatar" onclick="openModal('sidebar')">S</div>
        <div style="flex:1" onclick="openModal('sidebar')">
            <h4 id="headName">Saidjon AI</h4>
            <p id="status" style="font-size:11px; color:var(--tg-accent)">online</p>
        </div>
        <div style="cursor:pointer" onclick="checkAdmin()">⋮</div>
    </div>

    <div id="chat-window"></div>

    <div class="footer">
        <label>📎<input type="file" hidden onchange="uploadImage(event)"></label>
        <textarea id="userInput" placeholder="Нависед..."></textarea>
        <button class="btn-main" style="width:45px; height:45px; border-radius:50%; margin:0" onclick="send()">➤</button>
    </div>

    <div id="sidebar" class="modal">
        <div class="modal-header"><span onclick="closeModal('sidebar')" style="cursor:pointer; font-size:24px">←</span> <span>Профил ва Танзимот</span></div>
        <div style="text-align:center; padding:20px">
            <div id="profAv" class="avatar" style="width:100px; height:100px; font-size:40px; margin:auto; position:relative">
                S
                <label style="position:absolute; bottom:0; right:0; background:var(--tg-blue); padding:5px; border-radius:50%; cursor:pointer; font-size:12px">📷<input type="file" hidden onchange="changeProfilePic(event)"></label>
            </div>
            <h2 id="pName" style="margin-top:10px">Ном</h2>
            <p id="pNick" style="color:var(--tg-blue)">@username</p>
            <p id="pID" style="font-size:12px; color:#6c7883">ID: 00000</p>
            
            <div style="margin-top:20px; text-align:left">
                <div class="item"><div><label>Ном</label><input type="text" id="editName" style="margin:0; padding:5px; background:none; border:none; width:150px" onchange="updateProfile()"></div> <span>✏️</span></div>
                <div class="item"><div><label>Никнейм</label><input type="text" id="editNick" style="margin:0; padding:5px; background:none; border:none; width:150px" onchange="updateProfile()"></div> <span>✏️</span></div>
                <div class="item"><div><label>Давлат</label><span id="pCountry">TJ</span></div></div>
            </div>

            <button class="btn-main" style="background:var(--premium); margin-top:15px" onclick="openModal('premium-modal')">👑 ГУЗАШТАН БА ПРЕМИУМ</button>
            <button class="btn-main" style="background:#e74c3c; color:white; margin-top:10px" onclick="location.reload()">🚪 БАРОМАДАН</button>
        </div>
    </div>

    <div id="premium-modal" class="modal">
        <div class="modal-header"><span onclick="closeModal('premium-modal')" style="cursor:pointer">←</span> <span>Saidjon Premium</span></div>
        <div style="padding:20px; text-align:center">
            <h3 style="color:var(--premium)">Премиум Имкониятҳо</h3>
            <div style="background:#fff; color:#000; padding:20px; border-radius:15px; margin:20px 0">
                <p>Пардохт бо СБП (Сбербанк):</p>
                <h2 style="margin:10px 0">+79005778557</h2>
                <p style="font-size:12px">Чекро ба админ фиристед.</p>
                <input type="file" id="checkFile" style="margin-top:10px; font-size:10px">
            </div>
            <button class="btn-main" onclick="alert('Чек фиристода шуд!')">ФИРИСТОДАНИ ЧЕК</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="modal-header"><span onclick="closeModal('admin-panel')" style="cursor:pointer">←</span> <span>Админ Панел</span></div>
        <div style="padding:20px">
            <div style="background:var(--tg-panel); padding:15px; border-radius:10px; margin-bottom:10px">
                <h4>Омори Система</h4>
                <p>Корбарон: 1 | API: Фаъол</p>
            </div>
            <input type="text" placeholder="Калиди нави API" id="newKey">
            <button class="btn-main" onclick="alert('API Нав шуд!')">Update API</button>
            <button class="btn-main" style="background:red; color:white; margin-top:10px" onclick="confirm('Тоза кардани база?')">Clear Data</button>
        </div>
    </div>
</div>

<script>
    const KEY = atob("QUl6YVN5QVFjNGY1Um9LdlhXTklwN2ZSeFlOX2QxNlFLSFVlTk9N");
    let user = { name: "", nick: "", id: "", country: "", pass: "", photo: "" };

    function register() {
        user.name = document.getElementById('regName').value;
        user.nick = document.getElementById('regNick').value;
        user.pass = document.getElementById('regPass').value;
        user.country = document.getElementById('regCountry').value;
        user.id = user.nick === "admin" ? "77777" : Math.floor(10000 + Math.random() * 90000);
        
        if(!user.name || !user.nick) return alert("Пур кунед!");
        
        syncUI();
        document.getElementById('auth-screen').style.display = 'none';
        addMsg(`Хуш омадед, ${user.name}! ID-и шумо: ${user.id}`, "bot");
    }

    function syncUI() {
        document.getElementById('headName').innerText = user.name;
        document.getElementById('pName').innerText = user.name;
        document.getElementById('pNick').innerText = "@" + user.nick;
        document.getElementById('pID').innerText = "ID: " + user.id;
        document.getElementById('pCountry').innerText = user.country;
        document.getElementById('editName').value = user.name;
        document.getElementById('editNick').value = user.nick;
        
        const avatarText = user.name[0].toUpperCase();
        document.getElementById('headAv').innerText = user.photo ? "" : avatarText;
        document.getElementById('profAv').innerText = user.photo ? "" : avatarText;
    }

    function updateProfile() {
        user.name = document.getElementById('editName').value;
        user.nick = document.getElementById('editNick').value;
        syncUI();
    }

    function changeProfilePic(e) {
        const reader = new FileReader();
        reader.onload = () => {
            user.photo = reader.result;
            document.getElementById('headAv').innerHTML = `<img src="${user.photo}">`;
            document.getElementById('profAv').innerHTML = `<img src="${user.photo}">`;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    async function send() {
        const inp = document.getElementById('userInput');
        const txt = inp.value.trim();
        if(!txt) return;
        addMsg(txt, "user");
        inp.value = "";
        document.getElementById('status').innerText = "typing...";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({contents: [{parts:[{text: txt}]}]})
            });
            const data = await res.json();
            addMsg(data.candidates[0].content.parts[0].text, "bot");
        } catch(e) { addMsg("Хатогӣ дар пайвастшавӣ", "bot"); }
        document.getElementById('status').innerText = "online";
    }

    function addMsg(t, s) {
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerHTML = t + `<br><small style="opacity:0.5; font-size:10px">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} ${s==='user'?'<span class="ticks">✓✓</span>':''}</small>`;
        win.appendChild(d);
        win.scrollTop = win.scrollHeight;
    }

    function checkAdmin() {
        if(user.nick === "admin" && user.pass === "saidjon777") openModal('admin-panel');
        else alert("Ин танҳо барои админ аст!");
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
</body>
</html>
