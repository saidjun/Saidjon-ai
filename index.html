<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON TELEGRAM AI</title>
    <style>
        :root { --tg-bg: #0e1621; --tg-panel: #17212b; --tg-blue: #2481cc; --tg-accent: #00ff9d; --tg-text: #f5f5f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: #000; color: var(--tg-text); height: 100dvh; display: flex; justify-content: center; overflow: hidden; }

        /* НАВГОНИ: Splash Screen */
        #splash { position: fixed; inset: 0; background: var(--tg-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .s-logo { width: 80px; height: 80px; background: var(--tg-accent); border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #000; font-weight: bold; box-shadow: 0 0 20px var(--tg-accent); animation: pulse 2s infinite; }

        #app-wrapper { width: 100%; max-width: 450px; height: 100%; background: var(--tg-bg); display: flex; flex-direction: column; position: relative; }

        /* Sidebar */
        #sidebar { position: absolute; left: -100%; top: 0; width: 85%; height: 100%; background: var(--tg-panel); z-index: 100; transition: 0.3s; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #sidebar.open { left: 0; }
        .sidebar-header { padding: 30px 20px; background: #242f3d; }
        .side-avatar { width: 60px; height: 60px; background: var(--tg-accent); border-radius: 50%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; font-size: 24px; }
        
        /* НАВГОНИ: Search дар Sidebar */
        .side-search { margin: 10px 20px; background: var(--tg-bg); padding: 8px; border-radius: 8px; border: 1px solid #30363d; display: flex; gap: 5px; }
        .side-search input { background: transparent; border: none; color: white; outline: none; font-size: 14px; width: 100%; }

        .side-item { padding: 15px 20px; display: flex; align-items: center; gap: 20px; cursor: pointer; }
        .side-item:hover { background: rgba(255,255,255,0.05); }

        .header { padding: 10px 15px; background: var(--tg-panel); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #000; }
        .menu-btn { font-size: 24px; cursor: pointer; color: #6c7883; }
        .user-info { flex: 1; }
        .user-info h4 { font-size: 16px; }
        .user-info p { font-size: 12px; color: #6c7883; }

        #chat-content { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative; }
        .bot-msg { align-self: flex-start; background: var(--tg-panel); border-bottom-left-radius: 2px; }
        .user-msg { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        
        /* НАВГОНИ: Галочкаҳо */
        .msg-info { font-size: 10px; color: #6c7883; float: right; margin-top: 5px; margin-left: 8px; display: flex; align-items: center; gap: 3px; }
        .ticks { color: var(--tg-accent); }

        .footer { padding: 10px; background: var(--tg-panel); display: flex; align-items: flex-end; gap: 10px; }
        .input-box { flex: 1; background: var(--tg-bg); border-radius: 20px; padding: 5px 12px; display: flex; align-items: center; }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; font-size: 16px; resize: none; max-height: 120px; }
        
        .btn { background: transparent; border: none; color: #6c7883; font-size: 22px; cursor: pointer; }
        .send-btn { background: var(--tg-accent); color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; }
        
        .overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        .overlay.active { display: block; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="splash">
    <div class="s-logo">S</div>
    <p style="margin-top: 20px; color: var(--tg-accent); letter-spacing: 2px;">SAIDJON AI</p>
</div>

<div id="app-wrapper">
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="side-avatar">S</div>
            <div>Саидҷон</div>
            <div style="font-size: 12px; color: #6c7883;">online</div>
        </div>
        <div class="side-search"><span>🔍</span><input type="text" placeholder="Ҷустуҷӯ..."></div>
        <div class="side-item">👤 Профили ман</div>
        <div class="side-item">🔖 Паёмҳои ҳифзшуда</div>
        <div class="side-item">⚙️ Танзимот</div>
    </div>

    <div class="header">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="user-info">
            <h4>SAIDJON AI PRO</h4>
            <p id="status">online</p>
        </div>
        <div class="menu-btn">⋮</div>
    </div>

    <div id="chat-content">
        <div class="bubble bot-msg">
            Хуш омадед! Ҳама функсияҳо фаъоланд.
            <div class="msg-info">00:00</div>
        </div>
    </div>

    <div class="footer">
        <button class="btn">📎</button>
        <div class="input-box">
            <button class="btn">😊</button>
            <textarea id="userInput" placeholder="Паём..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button class="btn" id="micBtn" onclick="runMic()">🎤</button>
        </div>
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
    const _parts = ["QUl6YVN5QVFjNGY1Um9LdlhXTklwN2ZSeFlOX2QxNlFLSFVlTk9N"];
    const KEY = atob(_parts[0]);

    // Splash Screen нест кардан пас аз 2 сония
    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 500); }, 2000);

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function sendMsg() {
        const inp = document.getElementById('userInput');
        const txt = inp.value.trim();
        if(!txt) return;

        addBubble(txt, 'user-msg', true);
        inp.value = "";
        inp.style.height = "auto";
        document.getElementById('status').innerText = "typing...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            document.getElementById('status').innerText = "online";
            addBubble(reply, 'bot-msg', false);
        } catch (e) {
            document.getElementById('status').innerText = "online";
            addBubble("Хатогии техникӣ.", 'bot-msg', false);
        }
    }

    function addBubble(text, type, isUser) {
        const chat = document.getElementById('chat-content');
        const d = new Date();
        const time = d.getHours() + ":" + (d.getMinutes()<10?'0':'') + d.getMinutes();
        const ticks = isUser ? '<span class="ticks">✓✓</span>' : '';
        
        const b = document.createElement('div');
        b.className = `bubble ${type}`;
        b.innerHTML = `${text} <div class="msg-info">${time} ${ticks}</div>`;
        chat.appendChild(b);
        chat.scrollTop = chat.scrollHeight;
    }

    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
    }
    function runMic() { recognition.start(); }
</script>
</body>
</html>
