<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON AI PRO</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #welcome-screen { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; background: rgba(0, 0, 0, 0.7); }
        .box { padding: 40px 25px; background: rgba(15, 23, 42, 0.7); border: 1px solid #00ff9d; border-radius: 35px; text-align: center; backdrop-filter: blur(15px); width: 85%; max-width: 350px; }
        .logo { font-size: 70px; font-weight: 900; color: #00ff9d; text-shadow: 0 0 20px #00ff9d; margin-bottom: 10px; }
        h1 { color: #00ff9d; font-size: 20px; letter-spacing: 4px; margin-bottom: 30px; }
        .start-btn { padding: 20px 40px; background: #00ff9d; color: #000; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; }
        #chat-interface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 20; display: none; flex-direction: column; }
        .chat-header { padding: 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { color: #00ff9d; font-size: 18px; margin: 0; }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .bot { background: #334155; color: white; align-self: flex-start; }
        .user { background: #00ff9d; color: black; align-self: flex-end; font-weight: 500; }
        .input-area { padding: 15px; background: #1e293b; display: flex; gap: 10px; padding-bottom: 30px; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 12px; color: white; outline: none; }
        .send-btn { background: #00ff9d; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #typing { display: none; color: #00ff9d; font-size: 12px; padding: 5px 20px; }
    </style>
</head>
<body>
<canvas id="m"></canvas>
<div id="welcome-screen">
    <div class="box">
        <div class="logo">S</div>
        <h1>Saidjon AI</h1>
        <button class="start-btn" onclick="startApp()">ВАРУД БА СИСТЕМА</button>
    </div>
</div>
<div id="chat-interface">
    <div class="chat-header">
        <h2>SAIDJON AI PRO</h2>
        <button onclick="location.reload()" style="background:none; border:none; color:#888; font-size: 20px;">✕</button>
    </div>
    <div id="chat-messages">
        <div class="msg bot">Система фаъол шуд. Салом Саидҷон! Ман майнаи воқеии AI дорам. Савол деҳ!</div>
    </div>
    <div id="typing">Система фикр карда истодааст...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Савол диҳед..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>
<script>
    const API_KEY = "AIzaSyAQc4f5RoKvHWNIp7fRxYN_d16QKHUeNOM"; // Калиди ту аллакай инҷост

    function startApp() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('chat-interface').style.display = 'flex';
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        const typing = document.getElementById('typing');
        if (!text) return;

        addMessage(text, 'user');
        input.value = "";
        typing.style.display = "block";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            typing.style.display = "none";
            addMessage(aiResponse, 'bot');
        } catch (e) {
            typing.style.display = "none";
            addMessage("Хатогии техникӣ. Боварӣ ҳосил кунед, ки интернет кор мекунад.", 'bot');
        }
    }

    function addMessage(text, side) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.textContent = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // Matrix Background
    const c = document.getElementById("m");
    const ctx = c.getContext("2d");
    c.height = window.innerHeight; c.width = window.innerWidth;
    const txts = "01SAIDJONAI";
    const fz = 16;
    const cols = c.width / fz;
    const drops = [];
    for (let x = 0; x < cols; x++) drops[x] = 1;
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = "#00ff9d";
        ctx.font = fz + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = txts.charAt(Math.floor(Math.random() * txts.length));
            ctx.fillText(text, i * fz, drops[i] * fz);
            if (drops[i] * fz > c.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);
</script>
</body>
</html>
