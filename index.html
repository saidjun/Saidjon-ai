<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON AI PRO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #05070a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Экрани автоматикӣ барои ҳама телефонҳо */
        #container { 
            width: 100%; max-width: 500px; height: 100%; 
            margin: 0 auto; display: flex; flex-direction: column;
            background: #0d1117; position: relative;
        }

        .header { 
            padding: 15px; text-align: center; background: #161b22;
            border-bottom: 1px solid #30363d; font-weight: bold;
            color: #00ff9d; font-size: 1.1rem; letter-spacing: 1px;
        }

        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px;
            background-image: radial-gradient(#1f2937 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .m { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .bot { align-self: flex-start; background: #21262d; border: 1px solid #30363d; color: #e6edf3; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: #00ff9d; color: #000; font-weight: 500; border-bottom-right-radius: 4px; }

        .status { font-size: 12px; color: #8b949e; padding: 5px 15px; display: none; }

        .input-area { 
            padding: 12px; background: #161b22; border-top: 1px solid #30363d;
            display: flex; align-items: center; gap: 10px;
        }

        .input-bar { 
            flex: 1; background: #0d1117; border-radius: 25px; 
            border: 1px solid #30363d; display: flex; align-items: center; padding: 5px 15px;
        }

        input { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; font-size: 16px; }
        
        .btn-icon { background: transparent; border: none; color: #8b949e; cursor: pointer; font-size: 20px; }
        .send-btn { background: #00ff9d; border: none; width: 40px; height: 40px; border-radius: 50%; color: #000; font-weight: bold; cursor: pointer; }

        /* Микрофони сурх ҳангоми рекорд */
        .rec { color: #ff453a !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="container">
    <div class="header">SAIDJON AI PRO v10</div>
    
    <div id="chat-box">
        <div class="m bot">Салом Саидҷон! Экран автоматӣ шуд ва API махфӣ. Чиро тафтиш кунем?</div>
    </div>

    <div id="loading" class="status">AI фикр мекунад...</div>

    <div class="input-area">
        <div class="input-bar">
            <label class="btn-icon">📷<input type="file" style="display:none" accept="image/*"></label>
            <input type="text" id="msg-in" placeholder="Савол..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-icon" id="mic" onclick="startMic()">🎤</button>
        </div>
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    // Рамзгузории дукарата барои ҳифзи API аз блок
    const _p = ["AIzaSyAQc4f5RoK", "vHWNIp7fRxYN_d16", "QKHUeNOM"];
    const KEY = _p.join('');

    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.onresult = (e) => { 
            document.getElementById('msg-in').value = e.results[0][0].transcript;
            toggleMic(false);
        };
        recognition.onend = () => toggleMic(false);
    }

    function startMic() {
        toggleMic(true);
        recognition.start();
    }

    function toggleMic(on) {
        const m = document.getElementById('mic');
        on ? m.classList.add('rec') : m.classList.remove('rec');
    }

    async function send() {
        const inp = document.getElementById('msg-in');
        const val = inp.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        inp.value = "";
        document.getElementById('loading').style.display = "block";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
            });

            const data = await res.json();
            document.getElementById('loading').style.display = "none";

            if(data.candidates) {
                addMsg(data.candidates[0].content.parts[0].text, 'bot');
            } else {
                addMsg("Хатогӣ: Google API-ро блок кард. Калиди навро истифода баред.", "bot");
            }
        } catch (e) {
            document.getElementById('loading').style.display = "none";
            addMsg("Пайвастшавӣ нашуд. Интернетро санҷед.", "bot");
        }
    }

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `m ${s}`;
        d.textContent = t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
