<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON V48 - ULTIMATE GALAXY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary: #00f2ff; --premium: linear-gradient(45deg, #ffd700, #ffa500);
            --bg: #05080a; --panel: #0d121b; --text: #e0e6ed;
            --success: #00ff41; --danger: #ff0055;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

        /* UI Elements */
        .glass { background: rgba(13, 18, 27, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .hidden { display: none !important; }
        
        /* Layout */
        #app-shell { display: grid; grid-template-columns: 75px 1fr; height: 100vh; }
        
        /* Sidebar */
        .sidebar { background: #070a0f; display: flex; flex-direction: column; align-items: center; padding: 25px 0; border-right: 1px solid #1a222d; z-index: 100; }
        .nav-link { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; color: #505d6b; font-size: 22px; position: relative; }
        .nav-link.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); box-shadow: 0 0 15px rgba(0,242,255,0.1); }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--danger); font-size: 10px; padding: 2px 6px; border-radius: 10px; color: #fff; }

        /* Main Content */
        .content { overflow-y: auto; padding: 20px; padding-bottom: 90px; }
        .tab-pane { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Chat System */
        .msg { max-width: 85%; padding: 14px; border-radius: 20px; margin-bottom: 12px; font-size: 14px; position: relative; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: #0088cc; border-bottom-right-radius: 4px; color: #fff; }
        .msg.received { align-self: flex-start; background: #1a222d; border-bottom-left-radius: 4px; }
        .msg.premium { border: 1.5px solid #ffd700; background: linear-gradient(135deg, #0088cc 0%, #005588 100%); }

        /* Wallet Card */
        .wallet-card { background: linear-gradient(135deg, #1a222d, #05080a); border: 1px solid var(--primary); padding: 25px; border-radius: 25px; position: relative; overflow: hidden; }
        
        /* Admin Overlord */
        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 50000; display: none; flex-direction: column; }
        .admin-header { padding: 20px; background: #111; display: flex; justify-content: space-between; border-bottom: 2px solid var(--danger); }
        .console { flex: 1; margin: 20px; background: #050505; border: 1px solid #333; padding: 15px; font-family: monospace; color: var(--success); overflow-y: auto; font-size: 12px; }

        /* Toast */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; padding: 15px; border-radius: 15px; z-index: 100000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 12px; }
        #toast.show { top: 25px; }
    </style>
</head>
<body>

    <div id="toast" class="glass">
        <i id="t-icon" class="fa-solid fa-bell" style="color:var(--primary)"></i>
        <div><b id="t-title" style="display:block; font-size:14px;">Galaxy System</b><small id="t-body"></small></div>
    </div>

    <div id="app-shell">
        <nav class="sidebar">
            <div class="nav-link active" onclick="tab('chats', this)"><i class="fa-solid fa-message"></i><span class="badge">3</span></div>
            <div class="nav-link" onclick="tab('groups', this)"><i class="fa-solid fa-users"></i></div>
            <div class="nav-link" onclick="tab('wallet', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-link" onclick="tab('premium', this)"><i class="fa-solid fa-crown" style="color:gold"></i></div>
            <div class="nav-link" onclick="tab('settings', this)"><i class="fa-solid fa-sliders"></i></div>
            <div id="adm-btn" class="nav-link hidden" onclick="openAdmin()" style="margin-top:auto; color:var(--danger)"><i class="fa-solid fa-user-shield"></i></div>
        </nav>

        <main class="content">
            <div id="chats" class="tab-pane">
                <h2 style="margin-bottom:20px;">Паёмҳо</h2>
                <div onclick="openChat('Алишер', 'online')" style="display:flex; gap:15px; padding:15px; background:rgba(255,255,255,0.03); border-radius:18px; cursor:pointer;">
                    <div style="width:55px; height:55px; background:#222; border-radius:50%; position:relative;">
                        <div style="width:14px; height:14px; background:var(--success); border-radius:50%; position:absolute; bottom:2px; right:2px; border:2px solid var(--bg);"></div>
                    </div>
                    <div style="flex:1;">
                        <div style="display:flex; justify-content:space-between;"><b>Алишер</b> <small style="opacity:0.5;">Ҳозир</small></div>
                        <p style="font-size:13px; opacity:0.6; margin-top:5px;">V48 воқеан зуд кор мекунад!</p>
                    </div>
                </div>
            </div>

            <div id="groups" class="tab-pane hidden">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Гурӯҳҳо</h2>
                    <button onclick="showNotify('Гурӯҳ', 'Функсия дар ҳоли сохт...')" style="background:var(--primary); border:none; padding:8px 15px; border-radius:10px; color:#000; font-weight:bold;">+ Нав</button>
                </div>
                <div style="margin-top:20px; padding:15px; background:rgba(0,242,255,0.05); border:1px solid var(--primary); border-radius:15px;">
                    <b>Galaxy Official TG</b><br><small>42,805 аъзо</small>
                </div>
            </div>

            <div id="wallet" class="tab-pane hidden">
                <div class="wallet-card">
                    <small style="opacity:0.6;">БАЛАНСИ ШУМО</small>
                    <h1 id="user-bal" style="font-size:40px; margin:10px 0;">100.00 TJS</h1>
                    <div style="display:flex; gap:10px;">
                        <button onclick="qrPay()" style="flex:1; padding:12px; background:var(--primary); border:none; border-radius:12px; font-weight:bold;">QR PAY</button>
                        <button onclick="showNotify('Wallet', 'ID: 777-994')" style="flex:1; padding:12px; background:rgba(255,255,255,0.1); color:#fff; border:none; border-radius:12px;">RECEIVE</button>
                    </div>
                </div>
            </div>

            <div id="premium" class="tab-pane hidden">
                <div style="background:var(--premium); padding:30px; border-radius:25px; color:#000; text-align:center;">
                    <i class="fa-solid fa-crown" style="font-size:50px; margin-bottom:15px;"></i>
                    <h2>Galaxy Premium</h2>
                    <p style="margin:15px 0; font-size:14px;">300+ функсияҳо ва Ghost Mode-ро фаъол кунед</p>
                    <button onclick="getPremium()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; border-radius:15px; font-weight:bold;">50 TJS / МОҲ</button>
                </div>
            </div>

            <div id="settings" class="tab-pane hidden">
                <h2>Танзимот</h2>
                <div style="margin-top:20px; display:grid; gap:10px;">
                    <div class="glass" style="padding:15px; border-radius:15px; display:flex; justify-content:space-between;">
                        <span>Ghost Mode (Ноаён)</span>
                        <input type="checkbox" onchange="toggleGhost(this)">
                    </div>
                    <div class="glass" style="padding:15px; border-radius:15px; display:flex; justify-content:space-between;">
                        <span>Security 2FA</span>
                        <b style="color:var(--success)">ACTIVE</b>
                    </div>
                    <button onclick="location.reload()" style="padding:15px; background:var(--danger); border:none; border-radius:15px; color:#fff; font-weight:bold;">БАРОМАД (LOGOUT)</button>
                </div>
            </div>
        </main>
    </div>

    <div id="chat-ui" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; flex-direction:column;">
        <header class="glass" style="padding:15px; display:flex; align-items:center; gap:15px;">
            <i class="fa-solid fa-arrow-left" onclick="closeChat()"></i>
            <div style="width:40px; height:40px; background:#333; border-radius:50%;"></div>
            <div style="flex:1;"><b id="c-name">User</b><br><small id="c-status" style="color:var(--success)">online</small></div>
            <i class="fa-solid fa-phone" onclick="call()"></i>
        </header>
        <div id="c-flow" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column;"></div>
        <div class="glass" style="padding:15px; display:flex; gap:10px; align-items:center;">
            <i class="fa-solid fa-plus" style="opacity:0.6;"></i>
            <input type="text" id="c-input" placeholder="Паём..." style="flex:1; background:rgba(255,255,255,0.05); border:none; padding:12px; border-radius:25px; color:#fff; outline:none;">
            <button onclick="send()" style="width:45px; height:45px; border-radius:50%; background:var(--primary); border:none;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-header">
            <h2 style="color:var(--danger)">OVERLORD V48</h2>
            <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:var(--danger); border:none; color:#fff; padding:5px 12px; border-radius:5px;">EXIT</button>
        </div>
        <div class="console" id="a-log"></div>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('galaxy_v48')) || {
            name: "Saidjon", bal: 100, premium: false, role: "admin"
        };

        function tab(id, el) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }

        function openChat(name, status) {
            document.getElementById('chat-ui').classList.remove('hidden');
            document.getElementById('c-name').innerText = name;
            document.getElementById('c-status').innerText = status;
        }

        function closeChat() { document.getElementById('chat-ui').classList.add('hidden'); }

        function send() {
            const inp = document.getElementById('c-input');
            const flow = document.getElementById('c-flow');
            if(!inp.value) return;

            const div = document.createElement('div');
            div.className = `msg sent ${user.premium ? 'premium' : ''}`;
            div.innerHTML = `${inp.value} <div style="font-size:9px; opacity:0.5; margin-top:5px; text-align:right;">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} ✓✓</div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
            
            log(`[MSG] Sent: ${inp.value}`);
            inp.value = "";
        }

        function showNotify(t, b, type="primary") {
            const toast = document.getElementById('toast');
            document.getElementById('t-title').innerText = t;
            document.getElementById('t-body').innerText = b;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        function getPremium() {
            if(user.bal >= 50) {
                user.bal -= 50; user.premium = true;
                save();
                showNotify("Premium", "Табрик! Имкониятҳо кушода шуданд.", "success");
                setTimeout(() => location.reload(), 1500);
            } else { showNotify("Хато", "Маблағ кифоя нест."); }
        }

        function openAdmin() {
            if(prompt("Security Key:") === "saidjon777") {
                document.getElementById('admin-panel').style.display = "flex";
                log("[AUTH] Admin access granted.");
            }
        }

        function log(msg) {
            const l = document.getElementById('a-log');
            l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function save() { 
            localStorage.setItem('galaxy_v48', JSON.stringify(user));
            document.getElementById('user-bal').innerText = user.bal.toFixed(2) + " TJS";
        }

        window.onload = () => {
            save();
            if(user.role === 'admin') document.getElementById('adm-btn').classList.remove('hidden');
            showNotify("Galaxy V48", `Хуш омадӣ, ${user.name}!`);
        }
    </script>
</body>
</html>
