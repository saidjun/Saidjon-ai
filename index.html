<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON V50 - OMEGA ULTIMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary: #00f2ff; --premium: linear-gradient(45deg, #ffd700, #ffa500);
            --bg: #05080a; --panel: #0d121b; --text: #e0e6ed;
            --success: #00ff41; --danger: #ff0055; --ai: #8a2be2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

        /* App Layout */
        #main-shell { display: grid; grid-template-columns: 80px 1fr; height: 100vh; }
        .sidebar { background: #070a0f; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid #1a222d; }
        .nav-item { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 18px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; color: #505d6b; font-size: 24px; position: relative; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); box-shadow: 0 0 15px rgba(0,242,255,0.1); }

        /* Screens */
        .screen { padding: 25px; overflow-y: auto; height: 100%; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* Cards & Buttons */
        .glass-card { background: rgba(13, 18, 27, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-premium { background: var(--premium); color: #000; }

        /* Chat System */
        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 10px; font-size: 14px; position: relative; }
        .msg-sent { align-self: flex-end; background: #0088cc; border-bottom-right-radius: 4px; }
        .msg-received { align-self: flex-start; background: #1a222d; border-bottom-left-radius: 4px; }
        .msg-ai { align-self: flex-start; background: var(--ai); border-bottom-left-radius: 4px; box-shadow: 0 0 15px rgba(138, 43, 226, 0.2); }

        /* Admin & Video */
        #admin-os, #call-os { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        .console-box { flex: 1; margin: 20px; background: #050505; border: 1px solid #222; padding: 15px; font-family: monospace; color: var(--success); overflow-y: auto; font-size: 11px; }

        #toast-msg { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 15px; border-radius: 15px; z-index: 20000; transition: 0.5s; display: flex; align-items: center; gap: 12px; border: 1px solid var(--primary); }
        #toast-msg.active { top: 20px; }
    </style>
</head>
<body>

    <div id="toast-msg" class="glass-card">
        <i class="fa-solid fa-circle-info" style="color:var(--primary)"></i>
        <div><b id="toast-title">Galaxy V50</b><p id="toast-body" style="font-size:12px; opacity:0.8;"></p></div>
    </div>

    <div id="main-shell">
        <nav class="sidebar">
            <div class="nav-item active" onclick="switchTab('chats', this)"><i class="fa-solid fa-comments"></i></div>
            <div class="nav-item" onclick="switchTab('channels', this)"><i class="fa-solid fa-tower-broadcast"></i></div>
            <div class="nav-item" onclick="switchTab('wallet', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-item" onclick="switchTab('premium', this)"><i class="fa-solid fa-crown"></i></div>
            <div class="nav-item" onclick="switchTab('settings', this)"><i class="fa-solid fa-user-gear"></i></div>
            <div id="admin-lock" class="nav-item hidden" onclick="unlockAdmin()" style="margin-top:auto; color:var(--danger); border: 1px solid var(--danger);"><i class="fa-solid fa-lock"></i></div>
        </nav>

        <main class="content-area">
            <div id="chats" class="screen">
                <h2>Паёмҳо</h2>
                <div class="glass-card" onclick="openChatUI('Galaxy AI 🤖', true)" style="cursor:pointer; border-left: 5px solid var(--ai); margin-top:15px;">
                    <div style="display:flex; gap:15px; align-items:center;">
                        <div style="width:50px; height:50px; background:var(--ai); border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fa-solid fa-robot"></i></div>
                        <div><b>Ёвари Ҳушманд (AI)</b><br><small style="color:var(--ai)">Дар хат (Online)</small></div>
                    </div>
                </div>
            </div>

            <div id="channels" class="screen hidden">
                <h2>Каналҳои пулакӣ</h2>
                <div class="glass-card" style="margin-top:15px;">
                    <b>Сирҳои Барномасозӣ 🚀</b>
                    <p style="font-size:12px; opacity:0.6; margin:5px 0;">Омӯзиши Python ва JS аз сифр.</p>
                    <button onclick="joinPaidChannel(10)" class="btn-main btn-primary" style="padding:6px;">Обуна (10 TJS)</button>
                </div>
            </div>

            <div id="wallet" class="screen hidden">
                <div class="glass-card" style="background: linear-gradient(135deg, #0d121b, #1a222d); border: 1px solid var(--primary);">
                    <small>БАЛАНСИ КРИПТО</small>
                    <h1 id="user-balance" style="font-size:38px; color:var(--primary); margin:10px 0;">100.00 TJS</h1>
                    <div style="display:flex; gap:10px;">
                        <button onclick="showNotify('QR','Скан фаъол шуд')" class="btn-main btn-primary">Интиқол</button>
                        <button class="btn-main" style="background:rgba(255,255,255,0.05); color:#fff;">Қабул</button>
                    </div>
                </div>
            </div>

            <div id="premium" class="screen hidden">
                <div class="glass-card" style="background: var(--premium); color:#000; text-align:center;">
                    <i class="fa-solid fa-gem" style="font-size:50px; margin-bottom:15px;"></i>
                    <h2>GALAXY PREMUM</h2>
                    <p>Ghost Mode, Нишони тиллоӣ ва AI-и номаҳдуд.</p>
                    <button onclick="activatePremium()" class="btn-main" style="background:#000; color:#fff; margin-top:20px;">50 TJS / МОҲ</button>
                </div>
            </div>
        </main>
    </div>

    <div id="chat-window" class="hidden">
        <header class="glass-card" style="border-radius:0; display:flex; align-items:center; gap:15px; padding:15px;">
            <i class="fa-solid fa-chevron-left" onclick="closeChatUI()"></i>
            <div id="chat-avatar" style="width:40px; height:40px; border-radius:50%;"></div>
            <div style="flex:1;"><b id="chat-name">User</b><br><small id="chat-status" style="color:var(--success)">online</small></div>
            <i class="fa-solid fa-video" onclick="startCall()" style="font-size:20px; color:var(--primary);"></i>
        </header>
        <div id="chat-flow" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column;"></div>
        <div class="glass-card" style="border-radius:0; padding:15px; display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="Паём..." style="flex:1; background:rgba(255,255,255,0.05); border:none; padding:12px; border-radius:25px; color:#fff; outline:none;">
            <button onclick="sendMessage()" style="width:45px; height:45px; border-radius:50%; background:var(--primary); border:none;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-os">
        <div style="padding:20px; background:#111; display:flex; justify-content:space-between; border-bottom:2px solid var(--danger);">
            <h2 style="color:var(--danger)">OMEGA ADMIN ROOT</h2>
            <button onclick="document.getElementById('admin-os').style.display='none'" style="background:var(--danger); border:none; color:#fff; padding:5px 15px; border-radius:5px;">TERMINATE</button>
        </div>
        <div class="console-box" id="admin-logs"></div>
    </div>

    <div id="call-os">
        <div style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;">
            <div style="width:120px; height:120px; background:#222; border-radius:50%; margin-bottom:20px; border:2px solid var(--primary); animation: pulse 2s infinite;"></div>
            <h3 id="call-target">User</h3>
            <p>Пайваст шуда истодааст...</p>
        </div>
        <div style="padding:40px; display:flex; justify-content:center; gap:30px;">
            <button onclick="endCall()" style="width:65px; height:65px; border-radius:50%; background:red; border:none; color:#fff; font-size:25px;"><i class="fa-solid fa-phone-slash"></i></button>
            <button class="btn-main" style="width:65px; height:65px; border-radius:50%; background:#333; color:#fff;"><i class="fa-solid fa-microphone"></i></button>
        </div>
    </div>

    <script>
        // --- DATA ENGINE ---
        let appState = JSON.parse(localStorage.getItem('galaxy_v50')) || {
            user: "Saidjon", balance: 100, isPremium: false, role: "admin", chats: []
        };
        let isChattingWithAI = false;

        // --- NAVIGATION ---
        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // --- CHAT LOGIC ---
        function openChatUI(name, isAI) {
            isChattingWithAI = isAI;
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-avatar').style.background = isAI ? "var(--ai)" : "#444";
        }
        function closeChatUI() { document.getElementById('chat-window').classList.add('hidden'); }

        async function sendMessage() {
            const inp = document.getElementById('chat-input');
            const flow = document.getElementById('chat-flow');
            if(!inp.value) return;

            const text = inp.value;
            const msg = document.createElement('div');
            msg.className = `msg-bubble msg-sent ${appState.isPremium ? 'premium-style' : ''}`;
            msg.innerText = text;
            flow.appendChild(msg);

            if(isChattingWithAI) {
                document.getElementById('chat-status').innerText = "typing...";
                setTimeout(() => {
                    const aiMsg = document.createElement('div');
                    aiMsg.className = "msg-bubble msg-ai";
                    aiMsg.innerText = "Galaxy AI: Ташаккур барои паём! Ман ҳамчун ёвари Саидҷон ба шумо ёрӣ медиҳам. Саволи шумо: '" + text + "' сабт шуд.";
                    flow.appendChild(aiMsg);
                    document.getElementById('chat-status').innerText = "online";
                    flow.scrollTop = flow.scrollHeight;
                }, 1200);
            }

            flow.scrollTop = flow.scrollHeight;
            inp.value = "";
            logAdmin(`Message sent: ${text}`);
        }

        // --- WALLET & PREMIUM ---
        function activatePremium() {
            if(appState.balance >= 50) {
                appState.balance -= 50; appState.isPremium = true;
                save(); showNotify("Premium", "Табрик! Имкониятҳои Premium фаъол шуданд.");
                setTimeout(() => location.reload(), 2000);
            } else { showNotify("Хато", "Маблағ кифоя нест."); }
        }

        function joinPaidChannel(price) {
            if(appState.balance >= price) {
                appState.balance -= price; save();
                showNotify("Канал", "Шумо ба канали пулакӣ обуна шудед!");
            } else { showNotify("Хато", "Маблағ барои обуна кифоя нест."); }
        }

        // --- ADMIN SYSTEM ---
        function unlockAdmin() {
            const pass = prompt("ROOT PASSWORD:");
            if(pass === "saidjon777") {
                document.getElementById('admin-os').style.display = "flex";
                logAdmin("Overlord Access Granted.");
            }
        }

        // --- VIDEO CALL ---
        function startCall() {
            document.getElementById('call-target').innerText = document.getElementById('chat-name').innerText;
            document.getElementById('call-os').style.display = "flex";
        }
        function endCall() { document.getElementById('call-os').style.display = "none"; }

        // --- UTILS ---
        function showNotify(t, b) {
            const toast = document.getElementById('toast-msg');
            document.getElementById('toast-title').innerText = t;
            document.getElementById('toast-body').innerText = b;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3500);
        }

        function logAdmin(msg) {
            const box = document.getElementById('admin-logs');
            box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function save() {
            localStorage.setItem('galaxy_v50', JSON.stringify(appState));
            document.getElementById('user-balance').innerText = appState.balance.toFixed(2) + " TJS";
        }

        window.onload = () => {
            save();
            if(appState.role === 'admin') document.getElementById('admin-lock').classList.remove('hidden');
            showNotify("System", "Galaxy V50 Omega Ultimate фаъол шуд.");
        }
    </script>
</body>
</html>
