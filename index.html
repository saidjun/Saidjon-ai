<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON AI PRO MAX</title>
    <style>
        :root { --main-green: #00ff9d; --bg-black: #05070a; --chat-bg: #11141b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-black); color: white; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }

        /* Matrix Background */
        #c { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.2; }

        /* App Container */
        #app { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: rgba(5, 7, 10, 0.8); border-left: 1px solid #1f2937; border-right: 1px solid #1f2937; }

        /* Header */
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #1f2937; background: rgba(17, 20, 27, 0.9); backdrop-filter: blur(10px); }
        .header h1 { margin: 0; font-size: 18px; color: var(--main-green); letter-spacing: 2px; text-transform: uppercase; }

        /* Messages Area */
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.4; animation: slideIn 0.3s ease; }
        .bot { background: #1f2937; color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--main-green); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; box-shadow: 0 4px 12px rgba(0, 255, 157, 0.2); }

        /* Input Panel */
        .input-panel { padding: 20px; background: #11141b; border-top: 1px solid #1f2937; padding-bottom: 35px; }
        .bar { display: flex; align-items: center; background: #1c212c; border-radius: 25px; padding: 5px 12px; border: 1px solid #374151; transition: 0.3s; }
        .bar:focus-within { border-color: var(--main-green); box-shadow: 0 0 10px rgba(0, 255, 157, 0.1); }

        input { flex: 1; background: transparent; border: none; padding: 10px; color: white; outline: none; font-size: 15px; }
        
        .btn { background: transparent; border: none; color: #9ca3af; cursor: pointer; padding: 8px; font-size: 20px; transition: 0.2s; display: flex; align-items: center; }
        .btn:hover { color: var(--main-green); }
        .btn.mic-on { color: #ef4444; animation: blink 1s infinite; }

        .send-btn { background: var(--main-green); color: #000; width: 38px; height: 38px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 5px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        #loader { display: none; color: var(--main-green); font-size: 12px; margin: 0 0 10px 25px; font-style: italic; }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="app">
    <div class="header">
        <h1>Saidjon AI Pro</h1>
    </div>

    <div id="chat-box">
        <div class="msg bot">Система бо калиди нави API фаъол шуд. Салом Саидҷон! Ман омодаам.</div>
    </div>

    <div id="loader">AI фикр мекунад...</div>

    <div class="input-panel">
        <div class="bar">
            <label class="btn">📷<input type="file" id="f-in" style="display:none" accept="image/*"></label>
            <button class="btn" id="m-btn" onclick="runMic()">🎤</button>
            <input type="text" id="u-in" placeholder="Савол диҳед..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
    // Калиди нави ту (Амният зиёд карда шуд)
    const K = "AIzaSyCZtUOB8YOyjzwJX9jAyPIuLaf8kTVCqLQ";

    let rec;
    if ('webkitSpeechRecognition' in window) {
        rec = new webkitSpeechRecognition();
        rec.lang = 'ru-RU';
        rec.onresult = (e) => {
            document.getElementById('u-in').value = e.results[0][0].transcript;
            stopMicUI();
        };
        rec.onend = () => stopMicUI();
    }

    function runMic() {
        const b = document.getElementById('m-btn');
        if(b.classList.contains('mic-on')) { rec.stop(); stopMicUI(); }
        else { b.classList.add('mic-on'); rec.start(); }
    }
    function stopMicUI() { document.getElementById('m-btn').classList.remove('mic-on'); }

    async function send() {
        const inp = document.getElementById('u-in');
        const txt = inp.value.trim();
        if(!txt) return;

        addMsg(txt, 'user');
        inp.value = "";
        document.getElementById('loader').style.display = "block";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${K}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
            });
            const d = await res.json();
            const r = d.candidates[0].content.parts[0].text;
            
            document.getElementById('loader').style.display = "none";
            addMsg(r, 'bot');
        } catch (e) {
            document.getElementById('loader').style.display = "none";
            addMsg("Хатогӣ: Пайвастшавӣ бо майнаи AI нашуд. Лутфан интернетро тафтиш кунед.", 'bot');
        }
    }

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.textContent = t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    // Background Matrix
    const cv = document.getElementById('c');
    const ctx = cv.getContext('2d');
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    const dr = Array(Math.floor(cv.width/20)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(5,7,10,0.1)"; ctx.fillRect(0,0,cv.width,cv.height);
        ctx.fillStyle = "#00ff9d"; ctx.font = "15px monospace";
        dr.forEach((y, i) => {
            ctx.fillText(String.fromCharCode(Math.random()*128), i*20, y*20);
            if(y*20 > cv.height && Math.random() > 0.975) dr[i] = 0;
            dr[i]++;
        });
    }
    setInterval(draw, 33);
</script>
</body>
</html>
