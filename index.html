<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY V72 | SUPREME</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00f2ff; --bg: #010409; --panel: #0d1117; 
            --gold: #ffd700; --success: #238636; --danger: #f85149; --online: #39d353;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        .glass-card { background: rgba(22, 27, 34, 0.9); border: 1px solid #30363d; border-radius: 20px; padding: 15px; margin-bottom: 15px; position: relative; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: #000; }
        input, textarea { width: 100%; padding: 12px; background: #010409; border: 1px solid #30363d; border-radius: 10px; color: white; margin: 8px 0; outline: none; }

        #app { display: none; grid-template-columns: 80px 1fr; height: 100vh; }
        .sidebar { background: #010409; border-right: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 100; }
        .nav-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin-bottom: 15px; cursor: pointer; color: #8b949e; font-size: 20px; position: relative; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        .screen { display: none; padding: 20px; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }

        /* CHAT UI */
        .chat-container { display: flex; flex-direction: column; height: 70vh; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; position: relative; font-size: 14px; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: #30363d; color: #fff; border-bottom-left-radius: 2px; }
        .online-dot { width: 10px; height: 10px; background: var(--online); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px var(--online); }
        
        /* PROFILE */
        .p-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; cursor: pointer; }

        @media (max-width: 600px) {
            #app { grid-template-columns: 1fr; }
            .sidebar { position: fixed; bottom: 0; width: 100%; height: 65px; flex-direction: row; justify-content: space-around; padding: 0; border-top: 1px solid #30363d; background: var(--bg); }
            .nav-item { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <audio id="coinSound" src="https://www.myinstants.com/media/sounds/coin-collect.mp3"></audio>
    <audio id="msgSound" src="https://www.myinstants.com/media/sounds/notification.mp3"></audio>

    <div id="auth-screen" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div class="glass-card" style="width: 90%; max-width: 360px; text-align: center; padding: 30px;">
            <h1 style="color: var(--primary); margin-bottom: 25px;">GALAXY SUPREME</h1>
            <input type="email" id="log-email" placeholder="Email">
            <input type="password" id="log-pass" placeholder="Password">
            <button onclick="handleAuth('login')" class="btn btn-primary">ДАРОМАДАН</button>
            <p onclick="handleAuth('signup')" style="margin-top: 15px; font-size: 13px; color: var(--primary); cursor: pointer;">Сабти номи нав</p>
        </div>
    </div>

    <div id="app">
        <nav class="sidebar">
            <div class="nav-item active" onclick="tab('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="tab('chat', this)"><i class="fa-solid fa-comment"></i><span id="chat-badge" class="badge" style="display:none;">!</span></div>
            <div class="nav-item" onclick="tab('wallet', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-item" onclick="tab('profile', this)"><i class="fa-solid fa-user"></i></div>
            <div id="adm-nav" class="nav-item" style="display:none; color: var(--gold);" onclick="tab('admin', this)"><i class="fa-solid fa-crown"></i></div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; color: var(--danger);"><i class="fa-solid fa-power-off"></i></div>
        </nav>

        <main>
            <div id="home" class="screen active">
                <div class="glass-card" style="text-align: center; padding: 30px;">
                    <img id="h-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="p-img" style="width:70px; height:70px; margin-bottom:10px;">
                    <h2 id="u-display-name">...</h2>
                    <p id="u-balance" style="font-size: 40px; font-weight: 900; color: var(--gold);">0 TJS</p>
                    <div id="status-box"><span class="online-dot"></span> Дар сайт (Online)</div>
                </div>
                <div class="glass-card">
                    <b><i class="fa-solid fa-bullhorn" style="color:var(--primary)"></i> Хабарҳои охирин:</b>
                    <p id="global-news" style="font-size:13px; margin-top:10px; opacity:0.8;">Хуш омадед ба версияи нав! Акнун шумо метавонед бо дӯстон чат кунед.</p>
                </div>
            </div>

            <div id="chat" class="screen">
                <h2>Гурӯҳи GALAXY 💬</h2>
                <div class="glass-card chat-container">
                    <div id="chat-msgs" class="messages"></div>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="chat-input" placeholder="Нависед...">
                        <button class="btn btn-primary" style="width:60px;" onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div id="wallet" class="screen">
                <div class="glass-card" style="border: 1px solid var(--gold);">
                    <small style="color: var(--gold);">СБЕРБАНК / СБП:</small>
                    <div style="display: flex; align-items: center; justify-content: space-between; background: #000; padding: 15px; border-radius: 12px; margin: 10px 0;">
                        <b id="wallet-num">+79005778557</b>
                        <button onclick="copyNum()" class="btn" style="width: auto; padding: 5px 10px; font-size: 11px; background: var(--gold); color:#000;">Нусха</button>
                    </div>
                </div>
                <div class="glass-card">
                    <b>Бор кардани чек:</b>
                    <input type="number" id="topup-amount" placeholder="Маблағ (TJS)">
                    <input type="file" id="topup-file" accept="image/*" onchange="previewImg(this)">
                    <img id="img-preview" style="width: 100%; border-radius: 10px; display: none; margin: 10px 0;">
                    <button class="btn btn-primary" onclick="requestTopup()">ТАЙДИҚ</button>
                </div>
                <div class="glass-card">
                    <b>Таърихи пардохтҳо:</b>
                    <div id="user-history-list"></div>
                </div>
            </div>

            <div id="profile" class="screen">
                <h2>Танзимоти Профил</h2>
                <div class="glass-card" style="text-align:center;">
                    <label for="p-file">
                        <img id="p-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="p-img">
                        <p style="font-size:12px; color:var(--primary); margin-top:5px;">Ивази акс</p>
                    </label>
                    <input type="file" id="p-file" hidden onchange="updateAvatar(this)">
                    <input type="text" id="p-name" placeholder="Номи шумо">
                    <button class="btn btn-primary" onclick="saveProfile()">ЗАХИРА</button>
                </div>
            </div>

            <div id="admin" class="screen">
                <h2>Админ Панел 👑</h2>
                <div class="glass-card">
                    <button class="btn" style="background:var(--gold); color:#000;" onclick="sendGlobalNews()">Нашри Хабар</button>
                </div>
                <div id="admin-req-list"></div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdPoSKgrMgEdVdcZprdVayVOb7cUm8TsM",
            authDomain: "saidjon-forabes.firebaseapp.com",
            projectId: "saidjon-forabes",
            databaseURL: "https://saidjon-forabes-default-rtdb.firebaseio.com",
            storageBucket: "saidjon-forabes.firebasestorage.app",
            messagingSenderId: "13121799381",
            appId: "1:13121799381:web:2b515c4497ce4ea8d50e5c"
        };

        const TELEGRAM_TOKEN = "7165191876:AAGH5DRH7bEqmoC4OoGcJ5JUqNvJgSkTSYs";
        const TELEGRAM_CHAT_ID = "7165191876";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let uData = null, selectedImg = null, lastBal = null;

        function handleAuth(t) {
            const e = document.getElementById('log-email').value, p = document.getElementById('log-pass').value;
            if(t==='signup') auth.createUserWithEmailAndPassword(e,p); else auth.signInWithEmailAndPassword(e,p);
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('app').style.display='grid';
                loadUser(user.uid);
                setUserOnline(user.uid);
            } else {
                document.getElementById('auth-screen').style.display='flex';
                document.getElementById('app').style.display='none';
            }
        });

        function loadUser(uid) {
            db.ref('users/' + uid).on('value', snap => {
                uData = snap.val();
                if(!uData) {
                    db.ref('users/'+uid).set({name: 'Корбар', bal: 0, role: 'user', avatar: ''});
                    return;
                }
                document.getElementById('u-display-name').innerText = uData.name;
                document.getElementById('p-name').value = uData.name;
                if(uData.avatar) {
                    document.getElementById('h-avatar').src = uData.avatar;
                    document.getElementById('p-avatar').src = uData.avatar;
                }
                if(lastBal !== null && uData.bal > lastBal) document.getElementById('coinSound').play();
                lastBal = uData.bal;
                document.getElementById('u-balance').innerText = uData.bal + " TJS";

                if(uData.role === 'admin') {
                    document.getElementById('adm-nav').style.display = 'flex';
                    loadAdminRequests();
                }
                loadUserHistory();
                loadChat();
            });
        }

        // CHAT SYSTEM
        function sendMsg() {
            const text = document.getElementById('chat-input').value;
            if(!text) return;
            db.ref('chat').push({
                uid: auth.currentUser.uid,
                name: uData.name,
                text: text,
                time: Date.now(),
                avatar: uData.avatar || ''
            });
            document.getElementById('chat-input').value = '';
        }

        function loadChat() {
            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = '';
                snap.forEach(c => {
                    const m = c.val();
                    const isMe = m.uid === auth.currentUser.uid;
                    box.innerHTML += `
                        <div class="msg ${isMe?'sent':'received'}">
                            <small style="font-size:10px; display:block; opacity:0.7;">${m.name}</small>
                            ${m.text}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
                if(document.getElementById('chat').className.indexOf('active') === -1) {
                    document.getElementById('chat-badge').style.display = 'block';
                    document.getElementById('msgSound').play();
                }
            });
        }

        // PROFILE & ONLINE
        function updateAvatar(input) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('p-avatar').src = e.target.result;
                selectedImg = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveProfile() {
            const name = document.getElementById('p-name').value;
            let updates = { name: name };
            if(selectedImg) updates.avatar = selectedImg;
            db.ref('users/'+auth.currentUser.uid).update(updates).then(() => alert("Профил нав шуд!"));
        }

        function setUserOnline(uid) {
            const statusRef = db.ref('users/'+uid+'/status');
            statusRef.set('online');
            statusRef.onDisconnect().set('offline');
        }

        // WALLET (YOUR ORIGINAL CODE)
        function loadUserHistory() {
            db.ref('requests').orderByChild('uid').equalTo(auth.currentUser.uid).on('value', snap => {
                const list = document.getElementById('user-history-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const r = child.val();
                    const date = new Date(r.time).toLocaleString();
                    let statusColor = r.status === 'pending' ? 'gold' : (r.status === 'approved' ? '#238636' : '#f85149');
                    let statusText = r.status === 'pending' ? 'Дар баррасӣ' : (r.status === 'approved' ? 'Тасдиқ шуд' : 'Рад шуд');
                    list.innerHTML += `
                        <div style="border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between; align-items: center;">
                            <div><b>${r.amount} TJS</b><br><small style="opacity:0.5">${date}</small></div>
                            <div style="color:${statusColor}; font-weight:bold;">${statusText}</div>
                        </div>`;
                });
            });
        }

        function previewImg(input) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview').style.display = 'block';
                selectedImg = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function requestTopup() {
            const amt = document.getElementById('topup-amount').value;
            if(!amt || !selectedImg) return alert("Пур кунед!");
            const reqData = { uid: auth.currentUser.uid, name: uData.name, amount: amt, img: selectedImg, status: 'pending', time: Date.now() };
            db.ref('requests').push(reqData).then(() => {
                fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent("💰 ЧЕК: "+amt+" TJS\nКорбар: "+uData.name)}`);
                alert("Фиристода шуд!");
                selectedImg = null;
                document.getElementById('img-preview').style.display = 'none';
            });
        }

        // ADMIN FUNCTIONS
        function loadAdminRequests() {
            db.ref('requests').on('value', snap => {
                const list = document.getElementById('admin-req-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const r = child.val();
                    if(r.status === 'pending') {
                        list.innerHTML += `
                            <div class="glass-card">
                                <b>${r.name} (${r.amount} TJS)</b>
                                <img src="${r.img}" style="width:100%; border-radius:10px; margin:10px 0;">
                                <div style="display:flex; gap:10px;">
                                    <button class="btn btn-primary" onclick="approve('${child.key}','${r.uid}',${r.amount})">Тасдиқ</button>
                                    <button class="btn" style="background:var(--danger); color:white" onclick="db.ref('requests/${child.key}').update({status:'rejected'})">Рад</button>
                                </div>
                            </div>`;
                    }
                });
            });
        }

        function approve(key, uid, amt) {
            db.ref('users/'+uid+'/bal').transaction(c => (c||0) + Number(amt));
            db.ref('requests/'+key).update({status: 'approved'});
        }

        function sendGlobalNews() {
            const news = prompt("Тексти хабарро нависед:");
            if(news) db.ref('settings/news').set(news);
        }

        db.ref('settings/news').on('value', snap => {
            document.getElementById('global-news').innerText = snap.val() || 'Хабар нест.';
        });

        // UTILS
        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'chat') document.getElementById('chat-badge').style.display = 'none';
        }

        function copyNum() { navigator.clipboard.writeText("+79005778557"); alert("Нусха шуд!"); }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
