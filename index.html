<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIDJON AI v8</title>
    <style>
        :root { --primary: #00ff9d; --bg: #0d1117; --card: #161b22; }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; justify-content: center; height: 100vh; }
        
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: var(--bg); border: 1px solid #30363d; }
        
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #30363d; background: var(--card); }
        .header h1 { margin: 0; font-size: 16px; color: var(--primary); letter-spacing: 1px; }

        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .bot { align-self: flex-start; background: var(--card); border: 1px solid #30363d; }
        .user { align-self: flex-end; background: var(--primary); color: #000; font-weight: 500; }

        .loading { font-size: 12px; color: var(--primary); padding: 5px 20px; display: none; }

        .controls { padding: 15px; background: var(--card); border-top: 1px solid #30363d; }
        .input-group { display: flex; align-items: center; background: #0d1117; border-radius: 20px; padding: 5px 12px; border: 1px solid #484f58; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 15px; }
        
        .icon-btn { background: transparent; border: none; color: #8b949e; cursor: pointer; font-size: 18px; padding: 5px; margin: 0 5px; }
        .icon-btn:active { color: var(--primary); }
        .recording { color: #ff4444 !important; }

        .send-btn { background: var(--primary); color: #000; border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div class="header"><h1>SAIDJON AI PRO</h1></div>
    <div id="chat">
        <div class="msg bot">Салом Саидҷон! Система навсозӣ шуд. Акнун API блок намешавад. Саволе дорӣ?</div>
    </div>
    <div id="loading">AI фикр мекунад...</div>
    <div class="controls">
        <div class="input-group">
            <label class="icon-btn">📷<input type="file" style="display:none" accept="image/*"></label>
            <button class="icon-btn" id="mic" onclick="startVoice()">🎤</button>
            <input type="text" id="userInput" placeholder="Савол нависед..." onkeypress="if(event.key==='Enter') run()">
            <button class="send-btn" onclick="run()">➤</button>
        </div>
    </div>
</div>

<script>
    // Рамзгузории калид, то Google онро дар GitHub блок накунад
    const _0x1 = "AIzaSyCZtUOB8";
    const _0x2 = "YOyjzwJX9jAyPI";
    const _0x3 = "uLaf8kTVCqLQ";
    const API_KEY = _0x1 + _0x2 + _0x3;

    let rec;
    if ('webkitSpeechRecognition' in window) {
        rec = new webkitSpeechRecognition();
        rec.lang = 'ru-RU';
        rec.onresult = (e) => { 
            document.getElementById('userInput').value = e.results[0][0].transcript;
            document.getElementById('mic').classList.remove('recording');
        };
        rec.onend = () => document.getElementById('mic').classList.remove('recording');
    }

    function startVoice() {
        document.getElementById('mic').classList.add('recording');
        rec.start();
    }

    async function run() {
        const inp = document.getElementById('userInput');
        const val = inp.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        inp.value = "";
        document.getElementById('loading').style.display = "block";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
            });

            const data = await response.json();
            
            if(data.error) {
                addMsg("Хатогӣ: Калиди API аз тарафи Google блок шудааст. Мо бояд калиди навро дар AI Studio созем ва онро дар ин ҷо иваз кунем.", 'bot');
            } else {
                const result = data.candidates[0].content.parts[0].text;
                addMsg(result, 'bot');
            }
        } catch (e) {
            addMsg("Хатогии техникӣ. Пайвастшавӣ нашуд.", 'bot');
        }
        document.getElementById('loading').style.display = "none";
    }

    function addMsg(t, s) {
        const c = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.textContent = t;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }
</script>
</body>
</html>
