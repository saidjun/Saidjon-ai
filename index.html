<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saidjon AI Pro</title>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { width: 85%; max-width: 380px; padding: 40px 20px; background: rgba(15, 23, 42, 0.9); border: 1px solid #0ea5e9; border-radius: 40px; box-shadow: 0 0 30px rgba(14, 165, 233, 0.4); backdrop-filter: blur(10px); }
        .logo { width: 90px; height: 90px; background: linear-gradient(135deg, #0ea5e9, #6366f1); border-radius: 25px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 55px; font-weight: bold; }
        h1 { font-size: 24px; margin-bottom: 35px; letter-spacing: 2px; }
        .btn { display: block; background: #0ea5e9; color: white; text-decoration: none; padding: 20px; border-radius: 25px; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: #6366f1; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">S</div>
        <h1>SAIDJON AI</h1>
        <a href="https://gemini.google.com/app" class="btn">ОҒОЗИ СӮҲБАТ</a>
    </div>
</body>
</html>
