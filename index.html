<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY V72 | SUPREME SYSTEM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00f2ff; --bg: #010409; --panel: #0d1117; 
            --gold: #ffd700; --success: #238636; --danger: #f85149; --online: #39d353;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        .glass-card { background: rgba(22, 27, 34, 0.9); border: 1px solid #30363d; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: #000; }
        input { width: 100%; padding: 12px; background: #010409; border: 1px solid #30363d; border-radius: 10px; color: white; margin: 8px 0; outline: none; }

        #app { display: none; grid-template-columns: 80px 1fr; height: 100vh; }
        .sidebar { background: #010409; border-right: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 2000; }
        .nav-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin-bottom: 15px; cursor: pointer; color: #8b949e; font-size: 20px; position: relative; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; }

        .screen { display: none; padding: 20px; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CHAT UI */
        .chat-box { height: 60vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); border-radius: 15px; margin-bottom: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; }
        .msg.sent { align-self: flex-end; background: var(--primary); color: #000; }
        .msg.received { align-self: flex-start; background: #30363d; color: #fff; }

        .p-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        @media (max-width: 600px) {
            #app { grid-template-columns: 1fr; }
            .sidebar { position: fixed; bottom: 0; width: 100%; height: 65px; flex-direction: row; justify-content: space-around; padding: 0; border-top: 1px solid #30363d; background: var(--bg); }
            .nav-item { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <audio id="coinSound" src="https://www.myinstants.com/media/sounds/coin-collect.mp3"></audio>
    <audio id="msgSound" src="https://www.myinstants.com/media/sounds/notification.mp3"></audio>

    <div id="auth-screen" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div class="glass-card" style="width: 90%; max-width: 360px; text-align: center; padding: 30px;">
            <h1 style="color: var(--primary); margin-bottom: 25px;">GALAXY SUPREME</h1>
            <input type="email" id="log-email" placeholder="Email">
            <input type="password" id="log-pass" placeholder="Password">
            <button onclick="handleAuth('login')" class="btn btn-primary">ДАРОМАДАН</button>
            <p onclick="handleAuth('signup')" style="margin-top: 15px; font-size: 13px; color: var(--primary); cursor: pointer;">Сабти номи нав</p>
        </div>
    </div>

    <div id="app">
        <nav class="sidebar">
            <div class="nav-item active" onclick="tab('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="tab('chat', this)"><i class="fa-solid fa-comments"></i><span id="chat-badge" class="badge" style="display:none;">!</span></div>
            <div class="nav-item" onclick="tab('wallet', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-item" onclick="tab('profile', this)"><i class="fa-solid fa-user-gear"></i></div>
            <div id="adm-nav" class="nav-item" style="display:none; color: var(--gold);" onclick="tab('admin', this)"><i class="fa-solid fa-crown"></i></div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; color: var(--danger);"><i class="fa-solid fa-power-off"></i></div>
        </nav>

        <main>
            <div id="home" class="screen active">
                <div class="glass-card" style="text-align: center; padding: 30px;">
                    <img id="h-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="p-img" style="margin-bottom:10px;">
                    <h2 id="u-display-name">...</h2>
                    <p id="u-balance" style="font-size: 45px; font-weight: 900; color: var(--gold);">0 TJS</p>
                    <div style="font-size:12px; color:var(--online)"><i class="fa-solid fa-circle"></i> Онлайн</div>
                </div>
                <div class="glass-card">
                    <b style="color:var(--primary)">Хабари муҳим:</b>
                    <p id="global-news" style="font-size:13px; margin-top:5px; opacity:0.8;">Хуш омадед!</p>
                </div>
            </div>

            <div id="chat" class="screen">
                <div class="glass-card chat-box" id="chat-msgs"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chat-input" placeholder="Паём нависед...">
                    <button class="btn btn-primary" style="width:60px;" onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="wallet" class="screen">
                <div class="glass-card" style="border:1px solid var(--gold)">
                    <small>РЕКВИЗИТҲО:</small>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                        <b>+79005778557</b>
                        <button onclick="copyNum()" class="btn" style="width:auto; padding:5px 10px; font-size:12px; background:var(--gold)">Нусха</button>
                    </div>
                </div>
                <div class="glass-card">
                    <input type="number" id="topup-amount" placeholder="Маблағ">
                    <input type="file" id="topup-file" accept="image/*" onchange="previewImg(this)">
                    <img id="img-preview" style="width:100%; display:none; border-radius:10px; margin:10px 0;">
                    <button class="btn btn-primary" onclick="requestTopup()">ФИРИСТОДАНИ ЧЕК</button>
                </div>
                <div id="user-history-list"></div>
            </div>

            <div id="profile" class="screen">
                <div class="glass-card" style="text-align:center;">
                    <img id="p-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="p-img">
                    <input type="file" id="p-file" style="margin-top:10px;" onchange="updateAvatar(this)">
                    <input type="text" id="p-name" placeholder="Номи шумо">
                    <button class="btn btn-primary" onclick="saveProfile()">ЗАХИРА КАРДАН</button>
                </div>
            </div>

            <div id="admin" class="screen">
                <h2>Админ Панел 👑</h2>
                <button class="btn" style="background:var(--gold); margin:10px 0;" onclick="sendGlobalNews()">Нашри хабари нав</button>
                <div id="admin-req-list"></div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdPoSKgrMgEdVdcZprdVayVOb7cUm8TsM",
            authDomain: "saidjon-forabes.firebaseapp.com",
            projectId: "saidjon-forabes",
            databaseURL: "https://saidjon-forabes-default-rtdb.firebaseio.com",
            storageBucket: "saidjon-forabes.firebasestorage.app",
            messagingSenderId: "13121799381",
            appId: "1:13121799381:web:2b515c4497ce4ea8d50e5c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let uData = null, selectedImg = null, lastBal = null;

        function handleAuth(t) {
            const e = document.getElementById('log-email').value, p = document.getElementById('log-pass').value;
            if(t==='signup') auth.createUserWithEmailAndPassword(e,p); else auth.signInWithEmailAndPassword(e,p);
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('app').style.display='grid';
                loadUser(user.uid);
            } else {
                document.getElementById('auth-screen').style.display='flex';
                document.getElementById('app').style.display='none';
            }
        });

        function loadUser(uid) {
            db.ref('users/' + uid).on('value', snap => {
                uData = snap.val();
                if(!uData) {
                    db.ref('users/'+uid).set({name: 'User', bal: 0, role: 'user', avatar: ''});
                    return;
                }
                
                document.getElementById('u-display-name').innerText = uData.name;
                document.getElementById('p-name').value = uData.name;
                if(uData.avatar) {
                    document.getElementById('h-avatar').src = uData.avatar;
                    document.getElementById('p-avatar').src = uData.avatar;
                }

                // Ислоҳи админ (барои хатои нохунак)
                if(uData.role === 'admin' || uData.role === '"admin"') {
                    document.getElementById('adm-nav').style.display = 'flex';
                    loadAdminRequests();
                }

                if(lastBal !== null && uData.bal > lastBal) document.getElementById('coinSound').play();
                lastBal = uData.bal;
                document.getElementById('u-balance').innerText = uData.bal + " TJS";

                loadUserHistory();
                loadChat();
            });
        }

        // CHAT
        function sendMsg() {
            const text = document.getElementById('chat-input').value;
            if(!text) return;
            db.ref('chat').push({ uid: auth.currentUser.uid, name: uData.name, text: text, time: Date.now() });
            document.getElementById('chat-input').value = '';
        }

        function loadChat() {
            db.ref('chat').limitToLast(30).on('value', snap => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = '';
                snap.forEach(c => {
                    const m = c.val();
                    const isMe = m.uid === auth.currentUser.uid;
                    box.innerHTML += `<div class="msg ${isMe?'sent':'received'}"><b>${m.name}:</b><br>${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
                if(document.getElementById('chat').style.display !== 'block') {
                    document.getElementById('chat-badge').style.display = 'block';
                    document.getElementById('msgSound').play();
                }
            });
        }

        // PROFILE
        function updateAvatar(input) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('p-avatar').src = e.target.result;
                selectedImg = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveProfile() {
            const name = document.getElementById('p-name').value;
            let updates = { name: name };
            if(selectedImg) updates.avatar = selectedImg;
            db.ref('users/'+auth.currentUser.uid).update(updates).then(() => alert("Захира шуд!"));
        }

        // WALLET & HISTORY
        function loadUserHistory() {
            db.ref('requests').orderByChild('uid').equalTo(auth.currentUser.uid).on('value', snap => {
                const list = document.getElementById('user-history-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const r = child.val();
                    const st = r.status === 'pending' ? 'gold' : (r.status === 'approved' ? '#238636' : '#f85149');
                    list.innerHTML += `<div class="glass-card" style="display:flex; justify-content:space-between;">
                        <span>${r.amount} TJS</span> <b style="color:${st}">${r.status}</b>
                    </div>`;
                });
            });
        }

        function previewImg(input) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview').style.display = 'block';
                selectedImg = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function requestTopup() {
            const amt = document.getElementById('topup-amount').value;
            if(!amt || !selectedImg) return alert("Пур кунед!");
            db.ref('requests').push({ uid: auth.currentUser.uid, name: uData.name, amount: amt, img: selectedImg, status: 'pending', time: Date.now() });
            alert("Фиристода шуд!");
        }

        // ADMIN
        function loadAdminRequests() {
            db.ref('requests').on('value', snap => {
                const list = document.getElementById('admin-req-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const r = child.val();
                    if(r.status === 'pending') {
                        list.innerHTML += `<div class="glass-card">
                            <b>${r.name} - ${r.amount} TJS</b>
                            <img src="${r.img}" style="width:100%; margin:10px 0;">
                            <button class="btn btn-primary" onclick="approve('${child.key}','${r.uid}',${r.amount})">Тасдиқ</button>
                        </div>`;
                    }
                });
            });
        }

        function approve(key, uid, amt) {
            db.ref('users/'+uid+'/bal').transaction(c => (c||0) + Number(amt));
            db.ref('requests/'+key).update({status: 'approved'});
        }

        function sendGlobalNews() {
            const news = prompt("Хабари нав:");
            if(news) db.ref('settings/news').set(news);
        }
        db.ref('settings/news').on('value', snap => { document.getElementById('global-news').innerText = snap.val() || ''; });

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'chat') document.getElementById('chat-badge').style.display = 'none';
        }
        function copyNum() { navigator.clipboard.writeText("+79005778557"); alert("Нусха шуд!"); }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
