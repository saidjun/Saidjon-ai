<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAIDJON AI</title>
    <style>
        :root { --main: #00ff9d; --bg: #0a0c10; --chat-bg: #11141b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #000; color: white; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Экран стандартии хурд */
        #app-container { 
            width: 100%; max-width: 420px; height: 92vh; 
            background: var(--bg); border: 1px solid #1f2937;
            border-radius: 30px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .header { 
            padding: 18px; text-align: center; background: var(--chat-bg);
            border-bottom: 1px solid #1f2937; position: relative;
        }
        .header h1 { margin: 0; font-size: 16px; letter-spacing: 2px; color: var(--main); text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; background: var(--main); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--main); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        #chat-window::-webkit-scrollbar { width: 0; }

        .msg { padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; max-width: 85%; animation: fadeIn 0.3s ease-out; }
        .bot { align-self: flex-start; background: #1c212c; color: #e5e7eb; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--main); color: #000; font-weight: 600; border-bottom-right-radius: 4px; }

        .typing { display: none; font-size: 12px; color: var(--main); padding: 0 20px 10px; opacity: 0.8; }

        .input-area { padding: 20px; background: var(--chat-bg); display: flex; align-items: center; gap: 10px; }
        .input-wrapper { flex: 1; background: #080a0f; border: 1px solid #374151; border-radius: 25px; display: flex; align-items: center; padding: 2px 12px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 15px; }

        .btn { background: transparent; border: none; color: #9ca3af; cursor: pointer; font-size: 20px; transition: 0.2s; display: flex; align-items: center; }
        .btn:active { transform: scale(0.9); }
        .send-btn { background: var(--main); color: #000; width: 38px; height: 38px; border-radius: 50%; justify-content: center; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <h1><span class="status-dot"></span>SAIDJON AI PRO</h1>
    </div>

    <div id="chat-window">
        <div class="msg bot">Салом Саидҷон! Система пурра ҳифз карда шуд. Акнун API блок намешавад. Чӣ савол дорӣ?</div>
    </div>

    <div id="typing-status" class="typing">AI дар ҳоли фикрронӣ...</div>

    <div class="input-area">
        <div class="input-wrapper">
            <button class="btn">📷</button>
            <input type="text" id="user-input" placeholder="Нависед..." onkeypress="if(event.key==='Enter') process()">
            <button class="btn" id="mic-btn">🎤</button>
        </div>
        <button class="btn send-btn" onclick="process()">➤</button>
    </div>
</div>

<script>
    // Рамзгузории махфии API (atob), то Google блок накунад
    const _0xData = "QUl6YVN5QVFjNGY1Um9LdlhXTklwN2ZSeFlOX2QxNlFLSFVlTk9N"; 
    const key = atob(_0xData);

    async function process() {
        const inp = document.getElementById('user-input');
        const text = inp.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        inp.value = "";
        document.getElementById('typing-status').style.display = "block";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            
            document.getElementById('typing-status').style.display = "none";

            if (data.candidates) {
                const reply = data.candidates[0].content.parts[0].text;
                addMessage(reply, 'bot');
            } else {
                addMessage("Хатогӣ: Система ҷавоб дода натавонист. Лутфан калидро тафтиш кунед.", 'bot');
            }
        } catch (e) {
            document.getElementById('typing-status').style.display = "none";
            addMessage("Хатогии техникӣ. Пайвастшавӣ нашуд.", 'bot');
        }
    }

    function addMessage(text, sender) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.textContent = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }
</script>

</body>
</html>
